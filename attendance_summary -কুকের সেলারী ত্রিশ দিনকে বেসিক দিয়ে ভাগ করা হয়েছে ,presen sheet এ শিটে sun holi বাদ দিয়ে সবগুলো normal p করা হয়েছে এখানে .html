  const des = (designation || "").trim().toUpperCase();

}

let startPicker,

      // Robust date standardizer handling both YYYY-MM-DD and DD-MM-YYYY formats without UTC day shift
      function standardDateStr(s) {
        if (!s) return "";
        s = s.toString().trim();

        // Handle DD-MM-YYYY or DD/MM/YYYY
        const ddmmyyyyMatch = s.match(/^(\d{1,2})[-/](\d{1,2})[-/](\d{4})$/);
        if (ddmmyyyyMatch) {
          return `${ddmmyyyyMatch[3]}-${ddmmyyyyMatch[2].padStart(2, "0")}-${ddmmyyyyMatch[1].padStart(2, "0")}`;
        }

        // Handle YYYY-MM-DD
        const yyyymmddMatch = s.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})/);
        if (yyyymmddMatch) {
          return `${yyyymmddMatch[1]}-${yyyymmddMatch[2].padStart(2, "0")}-${yyyymmddMatch[3].padStart(2, "0")}`;
        }
        return s;
      }

      function normalizeDateKey(dateValue) {
        const standard = standardDateStr(dateValue);
        if (!standard) return "";
        return standard;
      }

      function buildOTMap(otRows) {
        if (!Array.isArray(otRows) || otRows.length < 2) return {};
        const headers = otRows[0].map((h) => h.toString().trim().toUpperCase());
        const idIndex = headers.findIndex((h) =>
          ["EMPLOYEE ID", "ID", "EMPLOYEEID", "WORKER ID"].includes(h),
        );
        const dateIndex = headers.findIndex((h) =>
          ["OT DATE", "DATE", "ATTENDANCE DATE", "WORK DATE"].includes(h),
        );
        const otIndex = headers.findIndex((h) =>
          ["TOTAL OT HOURS", "OT HOURS", "OVERTIME", "OT"].includes(h),
        );
        const otRateIndex = headers.findIndex((h) =>
          ["OT RATE", "OVERTIME RATE", "RATE"].includes(h),
        );
        globalOTHeaderMap = { idIndex, dateIndex, otIndex, otRateIndex };
        if (idIndex === -1 || dateIndex === -1 || otIndex === -1) return {};

        return otRows.slice(1).reduce((map, row) => {
          const id = (row[idIndex] || "").toString().trim().toUpperCase();
          const dateKey = normalizeDateKey(row[dateIndex]);
          const hours = parseFloat(row[otIndex]) || 0;
          const otRate =
            globalOTHeaderMap.otRateIndex !== -1
              ? parseFloat(row[globalOTHeaderMap.otRateIndex]) || 0
              : 0;
          if (!id || !dateKey || hours === 0) return map;
          const key = `${id}_${dateKey}`;
          if (!map[key]) map[key] = { hours: 0, otRate: 0, row };
          map[key].hours += hours;
          if (otRate > 0) map[key].otRate = otRate;
          return map;
        }, {});
      }

      // রিড খরচ বাঁচাতে এককালীন ডাটা ফেচিং (One-time fetch with query filters)
      async function setupOneTimeFetch(startDate, endDate) {
        const overtimeRef = window.dbRef(window.rtdb, "OVER_TIME");
        const advanceRef = window.dbRef(window.rtdb, "ADVANCE");

        // RTDB ফেচিং
        const [otSnap, advSnap] = await Promise.all([
          window.dbGet(overtimeRef),
          window.dbGet(advanceRef),
        ]);

        rtdbOvertimeMap = {};
        if (otSnap.exists()) {
          const overtimeData = otSnap.val();
          // ফরম্যাট: OVER_TIME -> Month_Year (e.g. April-2026) -> Date (e.g. 2026-04-01) -> docId (e.g. ACL-0006_2026-04-01) { TOTAL_OT_HOURS, ID, OT_Date }
          Object.keys(overtimeData).forEach((monthYear) => {
            const dates = overtimeData[monthYear];
            if (!dates || typeof dates !== "object") return;
            Object.keys(dates).forEach((dateKey) => {
              const docs = dates[dateKey];
              if (!docs || typeof docs !== "object") return;
              Object.keys(docs).forEach((docId) => {
                const record = docs[docId];
                if (!record) return;

                const empId = record.ID || record.id;
                const otDate = record.OT_Date || record.otDate || dateKey;
                const otHours = parseFloat(record.TOTAL_OT_HOURS) || 0;
                const otRate =
                  parseFloat(record.OT_Rate || record.OT_RATE) || 0;

                // তারিখ ফিল্টার করা হচ্ছে যাতে অপ্রয়োজনীয় ডেটা প্রসেস না হয়
                if (
                  empId &&
                  otDate &&
                  otDate >= startDate &&
                  otDate <= endDate
                ) {
                  const cleanEmpId = empId.toUpperCase().trim();
                  const cleanDate = normalizeDateKey(otDate);
                  if (!rtdbOvertimeMap[cleanEmpId])
                    rtdbOvertimeMap[cleanEmpId] = {};

                  // মাস ও তারিখ অনুযায়ী কর্মচারীর ওটি আওয়ার এবং রেট ম্যাপে অ্যাসাইন করা হচ্ছে
                  rtdbOvertimeMap[cleanEmpId][cleanDate] = {
                    hours: otHours,
                    rate: otRate,
                  };
                }
              });
            });
          });
        }

        rtdbAdvanceMap = {};
        if (advSnap.exists()) {
          const advanceData = advSnap.val();
          // ফরম্যাট: ADVANCE -> Month_Year -> Date -> docId { id, recordDate, amount }
          Object.keys(advanceData).forEach((monthYear) => {
            const dates = advanceData[monthYear];
            if (!dates || typeof dates !== "object") return;
            Object.keys(dates).forEach((dateKey) => {
              const docs = dates[dateKey];
              if (!docs || typeof docs !== "object") return;
              Object.keys(docs).forEach((docId) => {
                const record = docs[docId];
                if (!record) return;
                const empId = record.id || record.ID;
                const recDate = record.recordDate || dateKey;
                const amt = parseFloat(record.amount) || 0;

                if (empId && recDate) {
                  const cleanEmpId = empId.toUpperCase().trim();
                  const standardizedDate = normalizeDateKey(recDate);

                  if (standardizedDate) {
                    if (!rtdbAdvanceMap[cleanEmpId])
                      rtdbAdvanceMap[cleanEmpId] = {};
                    rtdbAdvanceMap[cleanEmpId][standardizedDate] = amt;
                  }
                }
              });
            });
          });
        }

        // Firestore ফেচিং (Query ব্যবহার করে রিড খরচ কমানো হচ্ছে)
        try {
          const attQuery = window.query(
            window.collectionGroup(window.db, "Present_Absent"),
            window.where("DATE", ">=", startDate),
            window.where("DATE", "<=", endDate),
          );

          const fsSnapshot = await window.getDocs(attQuery);

          if (fsSnapshot.empty) {
            rawData = [FIXED_HEADERS];
          } else {
            let attendanceDocs = [];
            fsSnapshot.forEach((doc) => {
              attendanceDocs.push({
                id: doc.id,
                path: doc.ref.path,
                data: doc.data(),
              });
            });
            rawData = convertDocsToRawData(attendanceDocs);
          }

          mapSheetColumns(rawData[0]);
          populateStaticFilters(rawData);
          processData();
        } catch (err) {
          console.error("Firestore optimized fetch failed:", err);
          // যদি ইনডেক্স না থাকে, তবে একটি লিঙ্ক দিবে কনসোলে।
          Swal.fire(
            "Error",
            "ডাটা ফেচ করতে সমস্যা হয়েছে। কনসোল চেক করুন।",
            "error",
          );
        }
      }

      // ফায়ারবেস ফিল্ড স্ট্রাকচার থেকে লোকাল গ্রিড ফরম্যাটে রূপান্তর (গ্লোবাল EMPLOYEE_LIST ওভাররাইড ম্যাপিং সহ)
      function convertDocsToRawData(attendanceDocs) {
        const data = [FIXED_HEADERS];
        attendanceDocs.forEach((docObj) => {
          const item = docObj.data;

          const pathSegments = docObj.path.split("/");
          let dateFromPath = "2026-04-01";
          for (let i = 0; i < pathSegments.length; i++) {
            if (pathSegments[i].startsWith("DATE_")) {
              dateFromPath = pathSegments[i].replace("DATE_", "");
              break;
            }
          }

          const empId = (item.ID || "ACL-0000").toUpperCase().trim();
          const dateKey = item.DATE || dateFromPath;
          const standardizedDate = normalizeDateKey(dateKey);

          // গ্লোবাল এমপ্লয়ী ম্যাপ থেকে সঠিক ডাটা রিসিভ করা (OT RATE, BASIC SALARY, NAME, DESIGNATION, PASSPORT, JOINING)
          const globalEmpMeta = globalEmployeeListMap[empId] || {};

          const empName = globalEmpMeta.name || item.EMPLOYEE_NAME || "Unknown";
          const designation =
            globalEmpMeta.designation || item.DESIGNATION || "WORKER";
          const passportNo = globalEmpMeta.passport || item.PASSPORT || "";
          const joiningDate = globalEmpMeta.joining || item.JOINING_DATE || "";

          // গ্লোবাল কালেকশন থেকে OT RATE এবং BASIC SALARY ওভাররাইড
          const docBasicSalary =
            globalEmpMeta.salary !== undefined && globalEmpMeta.salary > 0
              ? globalEmpMeta.salary
              : item.SALARY !== undefined
                ? item.SALARY
                : item.salary !== undefined
                  ? item.salary
                  : 0;
          const docOtRate =
            globalEmpMeta.otRate !== undefined && globalEmpMeta.otRate > 0
              ? globalEmpMeta.otRate
              : item.OT_RATE !== undefined
                ? item.OT_RATE
                : item.ot_rate !== undefined
                  ? item.ot_rate
                  : item["OT RATE"] !== undefined
                    ? item["OT RATE"]
                    : 0;

          // RTDB ওভারটাইম ডেটা থেকে ঘণ্টা রিসিভ (মাস ও তারিখ নিখুঁতভাবে ম্যাচিং করা হচ্ছে)
          let otHours = item.TOTAL_OT_HOURS || item.OT_HOURS || 0;
          let rtdbRate = 0;
          if (
            rtdbOvertimeMap[empId] &&
            rtdbOvertimeMap[empId][standardizedDate] !== undefined
          ) {
            const otInfo = rtdbOvertimeMap[empId][standardizedDate];
            if (typeof otInfo === "object") {
              otHours = otInfo.hours;
              rtdbRate = otInfo.rate;
            } else {
              otHours = parseFloat(otInfo) || 0;
            }
          }

          // RTDB অ্যাডভান্স ডেটা থেকে অ্যাডভান্স রিসিভ
          let advanceAmt = item.ADVANCE || 0;
          if (
            rtdbAdvanceMap[empId] &&
            rtdbAdvanceMap[empId][standardizedDate] !== undefined
          ) {
            advanceAmt =
              parseFloat(rtdbAdvanceMap[empId][standardizedDate]) || 0;
          }

          const docHolidayWork =
            item.HOLIDAY_WORK !== undefined
              ? item.HOLIDAY_WORK
              : item.holiday_work !== undefined
                ? item.holiday_work
                : item.HOLIDAY !== undefined
                  ? item.HOLIDAY
                  : 0;
          const docSundayWork =
            item.SUNDAY_WORK !== undefined
              ? item.SUNDAY_WORK
              : item.sunday_work !== undefined
                ? item.sunday_work
                : 0;

          const mappedItem = {
            "ISSUE DATE": dateKey,
            "ISSUE TIME": item.SYNC_TIME
              ? new Date(item.SYNC_TIME.seconds * 1000).toLocaleTimeString()
              : "12:00:00",
            "ATTENDANCE DATE": dateKey,
            "EMPLOYEE ID": empId,
            "EMPLOYEE NAME": empName,
            DESIGNATION: designation,
            "PASSPORT NO": passportNo,
            "JOINING DATE": joiningDate,
            "BASIC SALARY": docBasicSalary,
            "OT RATE": docOtRate,
            "TOTAL OT HOURS": otHours,
            "SUNDAY WORK": docSundayWork,
            HOLIDAY: docHolidayWork,
            "ATTENDANCE BONUS": item.ATTENDANCE_BONUS || 0,
            "PERFORMANCE BONUS": item.PERFORMANCE_BONUS || 0,
            ADVANCE: advanceAmt,
            FINE: item.FINE || 0,
            STATUS: item.STATUS || "Present",
            "SIDE NAME": item.SIDE_NAME || "MAIN SITE",
            REMARK: item.REMARK || "",
          };

          const row = FIXED_HEADERS.map((header) => {
            let val = mappedItem[header];
            return val !== undefined ? val : "";
          });
          row._docId = docObj.id;
          row._fullPath = docObj.path;
          data.push(row);
        });
        return data;
      }

      // আরটিডিবি তে ওটি/অ্যাডভান্স থাকা কিন্তু ফায়ারস্টোরে এটেনডেন্স না থাকা (Missing Employees) সিঙ্ক করার মেথড
      function mergeMissingRtdbRecords(currentRows) {
        const presentIds = new Set();
        const eIdx = colIndexMap["EMPLOYEE ID"];
        const dIdx = colIndexMap["ATTENDANCE DATE"];

        currentRows.forEach((row) => {
          const id = row[eIdx]?.toString().toUpperCase().trim();
          if (id) presentIds.add(id);
        });

        // আরটিডিবি ওভারটাইম কালেকশনের আইডির সাথে ম্যাচিং রান
        Object.keys(rtdbOvertimeMap).forEach((empId) => {
          const cleanId = empId.toUpperCase().trim();
          if (!presentIds.has(cleanId)) {
            const datesObj = rtdbOvertimeMap[empId];
            Object.keys(datesObj).forEach((dateStr) => {
              const otEntry = datesObj[dateStr];
              const otHours =
                typeof otEntry === "object"
                  ? otEntry.hours
                  : parseFloat(otEntry) || 0;
              const rtdbRate = typeof otEntry === "object" ? otEntry.rate : 0;

              if (otHours > 0) {
                const globalEmpMeta = globalEmployeeListMap[cleanId] || {};
                const newRow = Array(FIXED_HEADERS.length).fill("");

                const docBasicSalary = globalEmpMeta.salary || 0;
                const docOtRate = globalEmpMeta.otRate || rtdbRate || 0;

                newRow[colIndexMap["EMPLOYEE ID"]] = cleanId;
                newRow[colIndexMap["EMPLOYEE NAME"]] =
                  globalEmpMeta.name || "Unknown (RTDB Only)";
                newRow[colIndexMap["DESIGNATION"]] =
                  globalEmpMeta.designation || "WORKER";
                newRow[colIndexMap["PASSPORT NO"]] =
                  globalEmpMeta.passport || "";
                newRow[colIndexMap["JOINING DATE"]] =
                  globalEmpMeta.joining || "";
                newRow[colIndexMap["ATTENDANCE DATE"]] = dateStr;
                newRow[colIndexMap["ISSUE DATE"]] = dateStr;
                newRow[colIndexMap["BASIC SALARY"]] = docBasicSalary;
                newRow[colIndexMap["BASIC SALARY "]] = docBasicSalary;
                newRow[colIndexMap["OT RATE"]] = docOtRate;
                newRow[colIndexMap["TOTAL OT HOURS"]] = otHours;
                newRow[colIndexMap["STATUS"]] = "Absent"; // নো উপস্থিতি রেকর্ড
                newRow[colIndexMap["SIDE NAME"]] = "RTDB SITE";
                newRow[colIndexMap["REMARK"]] = "OT RECORD ONLY";

                // আরটিডিবি অ্যাডভান্স চেক
                let advAmt = 0;
                if (
                  rtdbAdvanceMap[cleanId] &&
                  rtdbAdvanceMap[cleanId][dateStr] !== undefined
                ) {
                  advAmt = parseFloat(rtdbAdvanceMap[cleanId][dateStr]) || 0;
                }
                newRow[colIndexMap["ADVANCE"]] = advAmt;

                newRow._docId = `MISSING_${cleanId}_${dateStr}`;
                newRow._fullPath = ""; // ডাটাবেজে নেই
                currentRows.push(newRow);

        // আরটিডিবি অ্যাডভান্স কালেকশনের আইডির সাথে ম্যাচিং রান
        Object.keys(rtdbAdvanceMap).forEach((empId) => {
          const cleanId = empId.toUpperCase().trim();
          if (!presentIds.has(cleanId)) {
            const datesObj = rtdbAdvanceMap[empId];
            Object.keys(datesObj).forEach((dateStr) => {
              const advAmt = parseFloat(datesObj[dateStr]) || 0;
              if (advAmt > 0) {
                // এটি ইতিমধ্যে ওভারটাইম মার্জে যুক্ত হয়েছে কিনা তা ভেরিফাই করার লজিক
                const alreadyAdded = currentRows.some(
                  (row) => row[eIdx] === cleanId && row[dIdx] === dateStr,
                );
                if (!alreadyAdded) {
                  const globalEmpMeta = globalEmployeeListMap[cleanId] || {};
                  const newRow = Array(FIXED_HEADERS.length).fill("");

                  const docBasicSalary = globalEmpMeta.salary || 0;
                  const docOtRate = globalEmpMeta.otRate || 0;

                  newRow[colIndexMap["EMPLOYEE ID"]] = cleanId;
                  newRow[colIndexMap["EMPLOYEE NAME"]] =
                    globalEmpMeta.name || "Unknown (RTDB Only)";
                  newRow[colIndexMap["DESIGNATION"]] =
                    globalEmpMeta.designation || "WORKER";
                  newRow[colIndexMap["PASSPORT NO"]] =
                    globalEmpMeta.passport || "";
                  newRow[colIndexMap["JOINING DATE"]] =
                    globalEmpMeta.joining || "";
                  newRow[colIndexMap["ATTENDANCE DATE"]] = dateStr;
                  newRow[colIndexMap["ISSUE DATE"]] = dateStr;
                  newRow[colIndexMap["BASIC SALARY"]] = docBasicSalary;
                  newRow[colIndexMap["BASIC SALARY "]] = docBasicSalary;
                  newRow[colIndexMap["OT RATE"]] = docOtRate;
                  newRow[colIndexMap["TOTAL OT HOURS"]] = 0;
                  newRow[colIndexMap["STATUS"]] = "Absent";
                  newRow[colIndexMap["SIDE NAME"]] = "RTDB SITE";
                  newRow[colIndexMap["REMARK"]] = "ADVANCE RECORD ONLY";
                  newRow[colIndexMap["ADVANCE"]] = advAmt;

                  newRow._docId = `MISSING_${cleanId}_${dateStr}`;
                  newRow._fullPath = "";
                  currentRows.push(newRow);
                }
              }
            });
          }
        });
      }

      function processData() {
        const startStr = document.getElementById("startDate").value;
        const endStr = document.getElementById("endDate").value;

        let startDate = startStr ? new Date(startStr) : null;
        if (startDate) startDate.setHours(0, 0, 0, 0);

        let endDate = endStr ? new Date(endStr) : null;
        if (endDate) endDate.setHours(23, 59, 59, 999);

        const search = document
          .getElementById("searchInput")
          .value.toLowerCase();
        const searchType = document.getElementById("searchType").value;
        const fEmp = document.getElementById("empFilter").value;
        const fSide = document.getElementById("sideFilter").value;
        const fType = document.getElementById("columnSelector").value;
        const fTypeVal = document
          .getElementById("typeValueSelect")
          .value.toLowerCase();

        const titleSpan = document.getElementById("salarySheetTitle");
        if (startStr && endStr) {
          titleSpan.innerText = `Records: ${startStr} to ${endStr}`;
          titleSpan.style.display = "inline";
        } else {
          titleSpan.style.display = "none";
        }

        const dIdx =
          colIndexMap["ATTENDANCE DATE"] || colIndexMap["ISSUE DATE"];
        const eIdx = colIndexMap["EMPLOYEE ID"];
        const sIdx = colIndexMap["SIDE NAME"];

        // ১. mian উপস্থিতি থাকা রেকর্ড ফিল্টারিং
        let filteredRows = rawData.slice(1).filter((row) => {
          const rId = row[eIdx]?.toString().toUpperCase() || "";
          const rSide = row[sIdx]?.toString().toUpperCase() || "";

          const rDate = parseDate(row[dIdx]);
          const compareDate = new Date(rDate.getTime());
          compareDate.setHours(0, 0, 0, 0);

          let match = true;
          if (startDate && compareDate < startDate) match = false;
          if (match && endDate && compareDate > endDate) match = false;

          if (match && search) {
            if (searchType === "ALL")
              match = row.join(" ").toLowerCase().includes(search);
            else
              match = (row[colIndexMap[searchType]] || "")
                .toString()
                .toLowerCase()
                .includes(search);
          }
          if (match && fEmp && rId !== fEmp) match = false;
          if (match && fSide && rSide !== fSide) match = false;
          if (match && fType && fTypeVal) {
            const cellVal = (row[colIndexMap[fType]] || "")
              .toString()
              .toLowerCase();
            if (cellVal !== fTypeVal) match = false;
          }
          return match;
        });

        // ২. আরটিডিবি রেকর্ড মার্জিং (অনুপস্থিত এমপ্লয়ীদের ডেটা সিঙ্ক)
        mergeMissingRtdbRecords(filteredRows);

        filteredRows.sort((a, b) => parseDate(b[dIdx]) - parseDate(a[dIdx]));

        const isSummary =
          startStr || endStr || fEmp || fSide || (fType && fTypeVal);
        if (isSummary) renderSummaryView(filteredRows);
        else renderDetailedView(filteredRows);

        updateStats(filteredRows);
      }

}

function recalculateGrandTotal() {
  let g = {
    mB:0, nar:0, sunD:0, holD:0, totP:0, totA:0,
    actB:0, otA:0, hA:0, sA:0, attB:0, perfB:0,

  };

  Object.values(globalSummary).forEach((emp) => {
    // ── Cook এর জন্য মাসের দিন দিয়ে ভাগ, বাকিদের ÷26 ──
    const dailyRate = getDailyRate(emp.mBasic, emp.designation, emp.refDate);
    const actB  = dailyRate * emp.narDays;
    const otA   = emp.otHrs * emp.otRate;
    const gross = actB + otA + emp.holAmt + emp.sunAmt + emp.attBonus + emp.perfBonus;
    const nps   = gross * 0.01;
    const csg   = gross * 0.015;
    const need  = gross - (emp.adv + emp.fine + nps + csg);

    g.mB    += emp.mBasic;
    g.nar   += emp.narDays;
    g.sunD  += emp.sunDays;
    g.holD  += emp.holiDays;
    g.totP  += emp.totalAtt;
    g.totA  += emp.absentDays;
    g.actB  += actB;
    g.otA   += otA;
    g.hA    += emp.holAmt;
    g.sA    += emp.sunAmt;
    g.attB  += emp.attBonus;
    g.perfB += emp.perfBonus;
    g.gross += gross;
    g.adv   += emp.adv;
    g.fine  += emp.fine;
    g.nps   += nps;
    g.csg   += csg;
    g.need  += need;
  });

  const tfoot = document.getElementById("tableFoot");
  tfoot.innerHTML = `<tr class="grand-total-row text-center" style="font-weight: bold; background-color: #f1f5f9;">
    <td colspan="2">GRAND TOTAL:</td>

    <td style="color: #d9534f;">${g.totA}</td>
    <td>${g.actB.toFixed(0)}</td>
    <td>${g.otA.toFixed(0)}</td>
    <td>${g.hA.toFixed(0)}</td>
    <td>${g.sA.toFixed(0)}</td>
    <td>${g.attB.toFixed(0)}</td>
    <td>${g.perfB.toFixed(0)}</td>
    <td style="background-color: #ebf8ff;">${g.gross.toFixed(2)}</td>
    <td>${g.adv.toFixed(0)}</td>
    <td>${g.fine.toFixed(0)}</td>
    <td>${g.nps.toFixed(2)}</td>
    <td>${g.csg.toFixed(2)}</td>
    <td class="highlight-col">${g.need.toFixed(2)}</td>
    <td></td>
  </tr>`;
}

      function openEditModal(rowIndex) {

        document.getElementById("displayEmpName").innerText =
          row[colIndexMap["EMPLOYEE NAME"]];
        document.getElementById("editStatus").value =
          row[colIndexMap["STATUS"]] || "Present";
        document.getElementById("editOT").value =
          row[colIndexMap["TOTAL OT HOURS"]] || 0;
        document.getElementById("editHoliday").value =
          row[colIndexMap["HOLIDAY"]] || 0;
        document.getElementById("editAdvance").value =
          row[colIndexMap["ADVANCE"]] || 0;
        bootstrapModal.show();
      }

      // এডিট করা ওভারটাইম এবং অ্যাডভান্স সরাসরি RTDB-তে ডাইনামিক পাথে আপডেট করার নিখুঁত পদ্ধতি
      async function saveEdit() {
        const idx = parseInt(document.getElementById("editRowIndex").value);
        const row = rawData[idx];
        const docPath = row._fullPath;
        const empId = row[colIndexMap["EMPLOYEE ID"]];
        const dateKey =
          row[colIndexMap["ATTENDANCE DATE"]] || row[colIndexMap["ISSUE DATE"]];

        const updatedStatus = document.getElementById("editStatus").value;
        const updatedOT =
          parseFloat(document.getElementById("editOT").value) || 0;
        const updatedHoliday =
          parseFloat(document.getElementById("editHoliday").value) || 0;
        const updatedAdvance =
          parseFloat(document.getElementById("editAdvance").value) || 0;

        bootstrapModal.hide();
        document.getElementById("loader").style.display = "block";

        try {
          // ১. ফায়ারস্টোরে মূল রেকর্ড আপডেট
          if (window.db && docPath) {
            const attDocRef = window.doc(window.db, docPath);
            await window.updateDoc(attDocRef, {
              STATUS: updatedStatus,
              HOLIDAY_WORK: updatedHoliday,
              HOLIDAY: updatedHoliday,

      function parseDate(s) {
        if (!s && s !== 0) return new Date(0);
        if (s instanceof Date) return s;

        const asString = s.toString().trim();
        if (asString === "" || asString === "-") return new Date(0);

        const gvizDateMatch = asString.match(
          /^Date\((\d+),\s*(\d+),\s*(\d+)(?:,\s*(\d+),\s*(\d+),\s*(\d+)(?:,\s*(\d+))?)?\)$/i,
        );
        if (gvizDateMatch) {
          const year = Number(gvizDateMatch[1]);
          const month = Number(gvizDateMatch[2]);
          const day = Number(gvizDateMatch[3]);
          const hour = gvizDateMatch[4] ? Number(gvizDateMatch[4]) : 0;
          const minute = gvizDateMatch[5] ? Number(gvizDateMatch[5]) : 0;
          const second = gvizDateMatch[6] ? Number(gvizDateMatch[6]) : 0;
          return new Date(year, month, day, hour, minute, second);
        }

        let dateString = asString.replace(/\//g, "-");
        const parts = dateString.split("-");

        if (parts.length === 3) {
          if (parts[0].length === 4)
            return new Date(parts[0], parts[1] - 1, parts[2]);
          if (parts[2].length === 4)
            return new Date(parts[2], parts[1] - 1, parts[0]);
        }
        const finalDate = new Date(dateString);
        return isNaN(finalDate.getTime()) ? new Date(0) : finalDate;
      }
