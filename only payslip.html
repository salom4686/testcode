<script>
const firebaseConfig = {
  apiKey: "AIzaSyA3uvPJTI3XXKQ2tbbmlKhEHYjh5Sz_r_k",
  authDomain: "munna-acl-fda7c.firebaseapp.com",

  projectId: "munna-acl-fda7c",
  storageBucket: "munna-acl-fda7c.firebasestorage.app",
  messagingSenderId: "371130316468",
  appId: "1:371130316468:web:61b4cba0dbbd5f027589e1",
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

flatpickr("#dateFrom",     { dateFormat: "Y-m-d", onChange: syncPanelDates });
flatpickr("#dateTo",       { dateFormat: "Y-m-d", onChange: syncPanelDates });
flatpickr("#panelDateFrom",{ dateFormat: "Y-m-d" });
flatpickr("#panelDateTo",  { dateFormat: "Y-m-d" });

function syncPanelDates() {
  const f = document.getElementById("dateFrom").value;
  const t = document.getElementById("dateTo").value;
  if (f) try { document.getElementById("panelDateFrom")._flatpickr.setDate(f); } catch(e){}
  if (t) try { document.getElementById("panelDateTo")._flatpickr.setDate(t); } catch(e){}
}

// ══════════════════════════════════════════
//  GLOBAL CACHE — একবার fetch, সব কাজে ব্যবহার
// ══════════════════════════════════════════
let _cache = {
  loaded: false,
  loading: false,
  empList: [],          // [{id, name, passport, desig, salary}]
  empMap: {},           // id → emp object
  attendance: {},       // empId → { "2025-01-01": "P"|"A"|"L"|"H" }
  otMap: {},            // empId → totalOtAmount (filtered by date range)
  advMap: {},           // empId → pendingAmount
};

// ── Preload all static data (emp list, advance) on page load ──
async function preloadStaticData() {
  if (_cache.loaded || _cache.loading) return;
  _cache.loading = true;
  setStatus("loading", "⏳ Loading data...");
  try {
    const db = firebase.firestore();
    const rtdb = firebase.database();

    // 1. Employee list
    const empSnap = await db.collection("EMPLOYEE_LIST").get();
    _cache.empList = [];
    _cache.empMap = {};
    empSnap.forEach(d => {
      const e = d.data();
      const emp = {
        id: e.id || d.id,
        name: e.name || "",
        passport: e.passport || "",
        desig: e.designation || "",
        salary: parseInt(e.salary) || 0,
        joining: e.joining || "",
      };
      _cache.empList.push(emp);
      _cache.empMap[emp.id] = emp;
    });
    _cache.empList.sort((a,b) => a.id.localeCompare(b.id));

    // 2. Advance data (static — doesn't change with date range)
    const advSnap = await rtdb.ref("ADVANCE_ADJUSTMENT_SUMMARY/USERS").once("value");
    const advData = advSnap.val() || {};
    _cache.advMap = {};
    for (const id in advData) {
      _cache.advMap[id] = parseInt(advData[id].pending) || 0;
    }

    _cache.loaded = true;
    _cache.loading = false;
    setStatus("ok", `✅ ${_cache.empList.length} employees loaded`);
  } catch(e) {
    _cache.loading = false;
    setStatus("err", "⚠️ Load error: " + e.message);
  }
}

function setStatus(type, msg) {
  const el = document.getElementById("cacheStatus");
  const dotClass = type === "ok" ? "status-ok" : "status-loading";
  el.innerHTML = `<span class="status-dot ${dotClass}"></span>${msg}`;
}

// ── Fetch attendance + OT for a specific date range (cached by range key) ──
let _attCache = {};  // key: "from|to" → { attendance: {}, otMap: {} }

async function fetchRangeData(dFromVal, dToVal) {
  const key = `${dFromVal}|${dToVal}`;
  if (_attCache[key]) return _attCache[key];

  setStatus("loading", "⏳ Fetching attendance & OT...");
  const db = firebase.firestore();
  const rtdb = firebase.database();
  const dFrom = new Date(dFromVal);
  const dTo = new Date(dToVal);

  // Attendance — date range Firestore-এই filter হবে, শুধু দরকারি documents নামবে
  const snap = await db.collectionGroup("Present_Absent")
    .where("DATE", ">=", dFromVal)
    .where("DATE", "<=", dToVal)
    .get();
  const attendance = {};  // empId → { date → remark/status info }

  snap.forEach(doc => {
    const d = doc.data();
    if (!d.ID || !d.DATE) return;

    const id = String(d.ID).trim();
    if (!attendance[id]) attendance[id] = { norm: 0, hol: 0, sun: 0, abs: 0, fine: 0, others: 0 };
    const rec = attendance[id];
    if (d.STATUS === "ABSENT") rec.abs++;
    if (d.REMARK === "NORMAL WORK") rec.norm++;
    rec.hol += parseInt(d.HOLIDAY_WORK) || 0;
    rec.sun += parseInt(d.SUNDAY_WORK) || 0;
    rec.fine = (rec.fine || 0) + (parseInt(d.FINE) || 0);
    rec.others = (rec.others || 0) + (parseInt(d.OTHERS) || 0);
  });

  // OT — RTDB-তে where clause নেই, তাই JS-এ filter
  // কিন্তু month/year key দিয়ে শুধু দরকারি month-এর data নামানো হচ্ছে
  const fromMY = `${dFromVal.substring(0,4)}-${dFromVal.substring(5,7)}`; // e.g. "2025-01"
  const toMY   = `${dToVal.substring(0,4)}-${dToVal.substring(5,7)}`;
  const otMap = {};  // empId → total OT amount

  // RTDB-তে OVER_TIME/{YYYY-MM}/... structure ধরে নিয়ে targeted fetch
 const otSnap = await rtdb.ref("OVER_TIME").once("value");
const otData = otSnap.val() || {};
for (const monthKey in otData) {
  const monthObj = otData[monthKey];
  if (typeof monthObj !== "object" || !monthObj) continue;
  
  for (const dateKey in monthObj) {
    const dateObj = monthObj[dateKey];
    if (typeof dateObj !== "object" || !dateObj) continue;
    
    for (const recKey in dateObj) {
      const row = dateObj[recKey];
      if (!row || !row.ID) continue;
      
      const otDateStr = String(row.OT_Date || "").trim();
      if (!otDateStr) continue;
      if (otDateStr < dFromVal || otDateStr > dToVal) continue;
      
      const id = String(row.ID).trim();
      otMap[id] = (otMap[id] || 0) + (parseFloat(row.Total_Taka) || 0);
    }
  }
}

  const result = { attendance, otMap };
  _attCache[key] = result;
  setStatus("ok", `✅ Data ready — ${Object.keys(attendance).length} employee records`);
  return result;
}

// ══════════════════════════════════════════
//  BUILD PAYSLIP DATA — from cache only, no DB calls
// ══════════════════════════════════════════
function getDaysInMonth(dateStr) {
  if (!dateStr) return 26;
  const d = new Date(dateStr);
  return new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
}

function buildPayslipData(empId, dFromVal, dToVal, rangeData) {
  const emp = _cache.empMap[empId] || { id: empId, name: "", desig: "", passport: "", joining: "", salary: 0 };
  const salary = emp.salary;
  const isCook = (emp.desig || "").trim().toUpperCase() === "COOK";
  const monthDays = getDaysInMonth(dFromVal);
  const dailyRate = isCook ? salary / monthDays : parseFloat((salary / 26).toFixed(2));

  const att = rangeData.attendance[empId] || { norm: 0, hol: 0, sun: 0, abs: 0, fine: 0, others: 0 };
  const totalOT = rangeData.otMap[empId] || 0;
  const totalAdvance = _cache.advMap[empId] || 0;

  const normalAmt = dailyRate * att.norm;
  const gross = normalAmt + att.hol + att.sun + totalOT + (att.others || 0);
  const csgEmp = Math.round(gross * 0.015 * 100) / 100;
  const npsEmp = Math.round(gross * 0.01 * 100) / 100;
  const totalDed = csgEmp + npsEmp + totalAdvance + (att.fine || 0);
  const netPay = gross - totalDed;

  const now = new Date();

  // Service length
  let serviceLength = "";
  if (emp.joining) {
    const parts = emp.joining.split(/[\/\-\.]/);
    let jDate;
    if (parts[0].length === 4) jDate = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
    else jDate = new Date(parseInt(parts[2]), parseInt(parts[1])-1, parseInt(parts[0]));
    if (!isNaN(jDate)) {
      let months = (now.getFullYear()-jDate.getFullYear())*12+(now.getMonth()-jDate.getMonth());
      if (now.getDate()<jDate.getDate()) months--;
      if (months < 0) months = 0;
      const years = Math.floor(months/12), rem = months%12;
      const formatted = years===0 ? `${rem} Month${rem!==1?'s':''}` :
        rem===0 ? `${years} Year${years!==1?'s':''}` :
        `${years} Year${years!==1?'s':''} ${rem} Month${rem!==1?'s':''}`;
      serviceLength = { total: months, formatted };
    }
  }

  return {
    empId: emp.id, name: emp.name, desig: emp.desig,
    passport: emp.passport, joining: emp.joining,
    entryDate: now.toLocaleDateString("en-GB"),
    time: now.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" }),
    serviceLength,
    normalWork: normalAmt.toFixed(2),
    holidayWork: att.hol.toFixed(2),
    sundayWork: att.sun.toFixed(2),
    overtime: totalOT.toFixed(2),
    others: (att.others||0).toFixed(2),
    gross: gross.toFixed(2),
    csgEmp: csgEmp.toFixed(2),
    npsEmp: npsEmp.toFixed(2),
    advanceRefund: totalAdvance.toFixed(2),
    fine: (att.fine||0).toFixed(2),
    absentDays: att.abs,
    totalDed: totalDed.toFixed(2),
    netPay: netPay.toFixed(2),
    netPayWords: numToWords(netPay),
  };
}

let _empListCache = null;

async function openEmpPanel() {
  document.getElementById("empPanel").classList.add("active");
  document.body.style.overflow = "hidden";
  syncPanelDates();
  if (!_cache.loaded) await preloadStaticData();
  if (!_empListCache) {
    _empListCache = _cache.empList;
    renderPanelRows(_empListCache);
  } else {
    renderPanelRows(_empListCache);
  }
}
function closeEmpPanel() {
  document.getElementById("empPanel").classList.remove("active");
  document.body.style.overflow = "";
}
document.getElementById("empPanel").addEventListener("click", e => {
  if (e.target === document.getElementById("empPanel")) closeEmpPanel();
});

function renderPanelRows(list) {
  const tbody = document.getElementById("empPanelBody");
  tbody.innerHTML = "";
  list.forEach(e => {
    const tr = document.createElement("tr");
    tr.dataset.id = e.id;
    tr.innerHTML = `
      <td style="text-align:center"><input type="checkbox" class="panel-cb" value="${e.id}" onchange="updatePanelCount()" style="width:15px;height:15px;accent-color:#6366f1;cursor:pointer"/></td>
      <td style="font-family:monospace;font-weight:700;color:var(--brand-blue)">${e.id}</td>
      <td style="font-weight:600">${e.name}</td>
      <td style="color:#6b7280;font-size:11px">${e.passport}</td>
      <td style="color:#6b7280;font-size:11px">${e.desig}</td>`;
    tr.addEventListener("click", ev => {
      if (ev.target.tagName === "INPUT") return;
      const cb = tr.querySelector(".panel-cb");
      cb.checked = !cb.checked;
      updatePanelCount();
    });
    tr.style.cursor = "pointer";
    tbody.appendChild(tr);
  });
  updatePanelCount();
}

function filterPanelList() {
  const q = document.getElementById("panelSearch").value.toLowerCase();
  document.querySelectorAll("#empPanelBody tr").forEach(tr => {
    tr.style.display = (tr.textContent||"").toLowerCase().includes(q) ? "" : "none";
  });
}

function togglePanelAll() {
  const master = document.getElementById("panelSelectAll").checked;
  document.querySelectorAll("#empPanelBody tr").forEach(tr => {
    if (tr.style.display === "none") return;
    const cb = tr.querySelector(".panel-cb");
    if (cb) cb.checked = master;
  });
  updatePanelCount();
}

function updatePanelCount() {
  const checked = document.querySelectorAll(".panel-cb:checked").length;
  const total = document.querySelectorAll(".panel-cb").length;
  document.getElementById("panelSelCount").textContent = `${checked} selected`;
  document.getElementById("panelGenBtn").disabled = checked === 0;
  const allCb = document.getElementById("panelSelectAll");
  allCb.indeterminate = checked > 0 && checked < total;
  allCb.checked = checked === total && total > 0;
  document.querySelectorAll("#empPanelBody tr").forEach(tr => {
    const cb = tr.querySelector(".panel-cb");
    if (cb) tr.style.background = cb.checked ? "#ede9fe" : "";
  });
}

// ══════════════════════════════════════════
//  GENERATE — সব data একবার fetch, তারপর loop
// ══════════════════════════════════════════
async function generateFromPanel() {
  const selected = [...document.querySelectorAll(".panel-cb:checked")].map(cb => cb.value);
  if (!selected.length) return;

  const dFromVal = document.getElementById("panelDateFrom").value;
  const dToVal   = document.getElementById("panelDateTo").value;
  if (!dFromVal || !dToVal) {
    showMsg("Please select a date range.", { title: "Date Required", type: "warn" });
    return;
  }

  const genBtn = document.getElementById("panelGenBtn");
  genBtn.disabled = true; genBtn.textContent = "⏳ Generating...";
  document.getElementById("genLoader").classList.add("active");
  updateLoader(0, selected.length, "");
  document.getElementById("genLoaderSub").textContent = "Fetching all data at once...";

  const win = window.open("", "_blank");
  if (!win) {
    showMsg("Popup blocked! Please allow popups in your browser.", { title: "Popup Blocked", type: "warn" });
    document.getElementById("genLoader").classList.remove("active");
    genBtn.disabled = false; genBtn.textContent = "⚡ Generate Payslip";
    return;
  }

  win.document.write(loaderPageHTML(selected.length));

  try {
    // ★ মাত্র ৩টি DB call — সব employee-এর জন্য একবার
    if (!_cache.loaded) await preloadStaticData();
    const rangeData = await fetchRangeData(dFromVal, dToVal);

    const period = `${fmtDate(new Date(dFromVal))} TO ${fmtDate(new Date(dToVal))}`;
    let allPages = "";

    for (let i = 0; i < selected.length; i++) {
      const empId = selected[i];
      updateLoader(i, selected.length, empId);
      tryUpdateWinLoader(win, i, selected.length, empId);

      // এখন কোনো DB call নেই — শুধু memory থেকে calculate
      const d = buildPayslipData(empId, dFromVal, dToVal, rangeData);
      allPages += `<div class="page">${buildOneSlip(d, period, "EMPLOYEE COPY")}${buildOneSlip(d, period, "OFFICE COPY")}</div>`;

      updateLoader(i + 1, selected.length, empId);
    }

    const fullHtml = `<!doctype html><html><head>
      <meta charset="UTF-8"><title>Payslips — ${period}</title>
      <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700;800&display=swap" rel="stylesheet">
      ${payslipWindowCSS()}
    </head><body>
      <div class="no-print">
        <button onclick="window.print()">🖨️ Print </button>
        &nbsp;&nbsp;<span style="font-size:13px;color:#555;font-weight:700">${selected.length} payslip(s) — ${period}</span>
      </div>
      ${allPages}
    </body></html>`;

    win.document.open(); win.document.write(fullHtml); win.document.close();
  } catch(e) {
    win.document.write(`<p style="color:red;padding:20px">Error: ${e.message}</p>`);
    showMsg(`Error: ${e.message}`, { title: "Generation Error", type: "err" });
  }

  document.getElementById("genLoader").classList.remove("active");
  genBtn.disabled = false; genBtn.textContent = "⚡ Generate Payslip";
}

function updateLoader(current, total, empId) {
  document.getElementById("genCountCurrent").textContent = current;
  document.getElementById("genCountTotal").textContent = total;
  document.getElementById("genProgressBar").style.width = (total > 0 ? (current/total*100) : 0) + "%";
  document.getElementById("genEmpBadge").innerHTML = empId ? `🔄 Processing: <span>${empId}</span>` : `🔄 Initializing...`;
  document.getElementById("genLoaderSub").textContent = total > 0 ? `${current} of ${total} payslip${total>1?'s':''} completed` : "Please wait...";
}

function tryUpdateWinLoader(win, i, total, empId) {
  try {
    if (win && !win.closed) {
      win.document.getElementById("cc").textContent = i;
      win.document.getElementById("pb").style.width = (i/total*100) + "%";
      win.document.getElementById("st").textContent = `Processing: ${empId}`;
    }
  } catch(e2) {}
}

    .spinner{width:56px;height:56px;border:5px solid #1e3a5f;border-top-color:#ffd700;border-right-color:rgba(255,215,0,0.4);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .title{color:#ffd700;font-size:22px;font-weight:700;letter-spacing:1.5px}
    .count-box{background:rgba(255,215,0,0.08);border:2px solid #ffd700;border-radius:14px;padding:14px 40px;text-align:center}
    .count-big{color:#ffd700;font-size:44px;font-weight:700;line-height:1}
    .count-of{color:#6a88aa;font-size:13px;font-weight:600;margin-top:4px}
    .bar-wrap{width:280px;height:8px;background:#001030;border-radius:20px;overflow:hidden}
    .bar{height:100%;background:linear-gradient(90deg,#ffd700,#ffe87a);width:0%;border-radius:20px;transition:width .4s}
    .sub{color:#6a88aa;font-size:12px;font-weight:600}
  </style></head><body>
    <div class="spinner"></div>
    <div class="title">⚡ Generating Payslips</div>
    <div class="count-box">
      <div class="count-big" id="cc">0</div>
      <div class="count-of">of ${total} payslip${total>1?'s':''}</div>
    </div>
    <div class="bar-wrap"><div class="bar" id="pb"></div></div>
    <div class="sub" id="st">Fetching data...</div>
  </body></html>`;
}

function numToWords(amount) {
  const ones=["","One","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Eleven","Twelve","Thirteen","Fourteen","Fifteen","Sixteen","Seventeen","Eighteen","Nineteen"];
  const tens=["","","Twenty","Thirty","Forty","Fifty","Sixty","Seventy","Eighty","Ninety"];
  function b100(n){if(n<20)return ones[n];return tens[Math.floor(n/10)]+(n%10?" "+ones[n%10]:"")}
  function b1000(n){if(n<100)return b100(n);return ones[Math.floor(n/100)]+" Hundred"+(n%100?" "+b100(n%100):"")}
  const num=Math.floor(Number(amount)||0);
  if(num===0)return"Zero Taka Only";
  let r="";
  if(num>=1000000)r+=b1000(Math.floor(num/1000000))+" Million ";
  if(num>=1000)r+=b1000(Math.floor((num%1000000)/1000))+" Thousand ";
  if(num%1000)r+=b1000(num%1000);
  return r.trim()+" Taka Only";
}

function fmtDate(d) {
  const day=String(d.getDate()).padStart(2,"0");
  const m=d.toLocaleString("en-US",{month:"short"}).toUpperCase();
  return `${day}-${m}-${d.getFullYear()}`;
}
