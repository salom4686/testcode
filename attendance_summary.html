<html lang="en">
  <head>
    <meta charset="UTF-8" />
   <!-- attendance_summary - কুকের সেলারী ত্রিশ দিনকে বেসিক দিয়ে ভাগ করা হয়েছে, present sheet এ শনি ও হলিডে বাদ দিয়ে সবগুলো normal P করা হয়েছে এখানে -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attendance & Salary</title>

    <link rel="icon" type="image/png" href="https://drive.google.com/thumbnail?id=11bxOPboUUmQxIkT6gMYWYqxfh9jZSiLo&sz=w500" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />

    <style>
  :root {
    --brand-blue: #001d3d;
    --brand-gold: #ffd700;
    --header-text: #ffffff;
    --bg-light: #001d3d;
    --accent-yellow: #fff9e6;
    --btn-reset: #dc3545;
    --highlight-green: #e6fffa;
  }
  body {
    background-color: var(--brand-blue);
    padding: 10px;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
  }
  .main-card {
    background: #001d3d;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    margin: 0 auto;
    border: 2px solid var(--brand-gold);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    max-height: 96vh;
  }
  .page-header {
    background: linear-gradient(135deg, #001d3d 0%, #003580 60%, #001530 100%);
    padding: 10px 20px;
    border-bottom: 4px solid var(--brand-gold);
    display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
  }
  .brand-title h2 {
    background: linear-gradient(135deg,#bf953f 0%,#fcf6ba 25%,#b38728 50%,#fbf5b7 75%,#aa771c 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    font-weight: 800; margin: 0; font-size: 1.5rem;
    filter: drop-shadow(1px 1px 3px rgba(255,215,0,0.3));
  }
  .brand-title span {
    background: linear-gradient(135deg,#b38728 0%,#fcf6ba 50%,#aa771c 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    font-weight: 700; font-size: 0.85rem !important; display: inline-block;
  }

  /* ── Buttons ── */
  .btn-action { font-size: 10px; padding: 4px 10px; font-weight: 600; }
  .btn-reset  { background-color: var(--btn-reset); color: white; border: none; }
  .btn-reset.btn-action {
    background-color: #ffc107; color: #000; border: 1px solid #000; transition: all 0.3s ease;
  }
  .btn-reset.btn-action:hover {
    background-color: #ff2802 !important; color: #fff !important;
    border-color: #fff !important;
  }
  .btn-reset.btn-action:active { background-color: #d39e00 !important; transform: translateY(2px); }
  .btn-outline-success { color: var(--brand-gold) !important; border-color: var(--brand-gold) !important; }
  .btn-outline-success:hover { background: var(--brand-gold) !important; color: #001d3d !important; }
  .btn-outline-primary { color: #90caf9 !important; border-color: #90caf9 !important; }
  .btn-outline-primary:hover { background: #90caf9 !important; color: #001d3d !important; }
  .btn-primary { background: var(--brand-gold) !important; color: #001d3d !important; border-color: var(--brand-gold) !important; font-weight: 700; }
  .btn-primary:hover { background: #ffe840 !important; }

  /* ── Filter Section ── */
  .filter-section {
    padding: 12px;
    background: #002147;
    border-bottom: 2px solid var(--brand-gold);
    display: grid; grid-template-columns: repeat(auto-fit, minmax(130px,1fr));
    gap: 8px; align-items: end; flex-shrink: 0;
  }
  .filter-group label {
    font-size: 9px; font-weight: 700; color: var(--brand-gold);
    margin-bottom: 2px; display: block; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .form-control, .form-select {
    background-color: #001530 !important;
    color: #e0e8f4 !important;
    border: 1.5px solid #3a5a8a !important;
    font-size: 11px;
  }
  .form-control:focus, .form-select:focus {
    border-color: var(--brand-gold) !important;
    box-shadow: 0 0 0 2px rgba(255,215,0,0.2) !important;
  }
  .form-control::placeholder { color: #6a88aa !important; }
  .custom-date-input { cursor: pointer !important; font-weight: 600; }

  /* ── Summary Bar ── */
  .summary-bar {
    padding: 8px 20px;
    background: #002147;
    border-bottom: 2px solid var(--brand-gold);
    display: flex; gap: 16px; font-weight: bold;
    color: var(--brand-gold);
    font-size: 12px; align-items: center; flex-wrap: wrap;
  }
  .stat-box {
    background: #001530;
    color: var(--brand-gold);
    padding: 2px 10px; border-radius: 4px;
    border: 1px solid var(--brand-gold);
  }

  /* ── Working Days Badge ── */
  .wd-badge {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,215,0,0.08);
    border: 1.5px solid var(--brand-gold);
    border-radius: 6px; padding: 3px 10px; font-size: 10px;
  }
  .wd-badge label { font-size: 9px; font-weight: 700; color: var(--brand-gold); margin: 0; white-space: nowrap; }
  .wd-badge input[type="number"] {
    width: 52px; padding: 2px 5px; font-size: 11px; font-weight: 700;
    border: 1.5px solid var(--brand-gold); border-radius: 4px;
    text-align: center; color: var(--brand-gold);
    background: #001530;
  }
  .wd-badge .wd-status { font-size: 10px; font-weight: 700; color: #4ade80; white-space: nowrap; }
  .wd-badge button {
    background: #0d9488; color: white; border: none;
    padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; cursor: pointer;
  }
  .wd-badge button:hover { background: #065f46; }

  /* ── Table ── */
  .table-responsive { overflow: auto; flex-grow: 1; position: relative; background: #fff; }
  .attendance-table { width: 100%; border-collapse: separate; border-spacing: 0; }
  .attendance-table thead th {
    background-color: #001d3d !important;
    color: #ffffff !important;
    padding: 6px 4px; text-align: center; font-size: 9px;
    position: sticky; top: 0; z-index: 20;
    border: 1px solid #335185 !important;
    text-transform: uppercase; white-space: nowrap;
  }
  .attendance-table tbody td {
    padding: 4px 3px; text-align: center; font-size: 10px;
    border: 1px solid #e0e0e0; white-space: nowrap;
    background: #fff;
  }
  .attendance-table tbody tr:nth-child(even) td { background: #f0f4f8; }
  .attendance-table tbody tr:hover td { background: #fff9e6 !important; }
  .total-attendance-col { background-color: var(--accent-yellow); font-weight: 700; color: #001d3d; }
  .highlight-col { background-color: var(--highlight-green); font-weight: 700; color: #0d685b; }
  .grand-total-row td {
    background-color: #001d3d !important;
    color: var(--brand-gold) !important;
    font-weight: 900 !important;
    border: 1px solid #335185 !important;
  }

  /* ── Loader ── */
  #loader {
    padding: 40px; text-align: center;
    color: var(--brand-gold); display: none;
    background: #001d3d;
  }
  #loader p { color: var(--brand-gold); }

  /* ── Search Input ── */
  .search-input-group { display: flex; }
  .search-input-group select { border-top-right-radius: 0; border-bottom-right-radius: 0; width: 80px; font-size: 10px; }
  .search-input-group input  { border-top-left-radius: 0; border-bottom-left-radius: 0; font-size: 10px; }

  /* ── Modals ── */
  .modal-content {
    background: #001d3d !important;
    border: 2px solid var(--brand-gold) !important;
    color: #e0e8f4;
  }
  .modal-header { border-bottom: 2px solid var(--brand-gold) !important; }
  .modal-footer { border-top: 2px solid var(--brand-gold) !important; }
  .modal-title { color: var(--brand-gold) !important; font-weight: 700; }
  .form-label { color: var(--brand-gold) !important; }
  .modal .form-control, .modal .form-select {
    background: #001530 !important; color: #e0e8f4 !important;
    border-color: #3a5a8a !important;
  }
  .modal .btn-light {
    background: transparent !important; color: var(--brand-gold) !important;
    border: 1px solid var(--brand-gold) !important;
  }
  .modal .btn-light:hover { background: var(--brand-gold) !important; color: #001d3d !important; }
  .text-primary { color: var(--brand-gold) !important; }
/* ══ Flatpickr — Navy Blue & Golden Theme ══ */
/* ══ Flatpickr — Navy Blue & Golden Theme ══ */
.flatpickr-calendar { 
  background: #001d3d !important; 
  border: 2px solid var(--brand-gold) !important;
  box-shadow: 0 8px 25px rgba(0,0,0,0.5) !important;
}
.flatpickr-day { 
  color: #a0c4ff !important; 
  border-radius: 4px !important;
}
.flatpickr-day.selected, 
.flatpickr-day.today { 
  background: var(--brand-gold) !important; 
  color: #001d3d !important; 
  border-color: var(--brand-gold) !important; 
  font-weight: 700 !important;
}
.flatpickr-day:hover { 
  background: rgba(255,215,0,0.25) !important; 
  color: var(--brand-gold) !important; 
  border-color: var(--brand-gold) !important; 
}
.flatpickr-months .flatpickr-month, 
.flatpickr-weekdays, 
span.flatpickr-weekday { 
  background: #001d3d !important; 
  color: var(--brand-gold) !important; 
  font-weight: 700 !important;
}
.flatpickr-day.prevMonthDay, 
.flatpickr-day.nextMonthDay { 
  visibility: hidden !important; 
}
.flatpickr-prev-month, 
.flatpickr-next-month { 
  color: var(--brand-gold) !important; 
  fill: var(--brand-gold) !important;
  padding: 5px !important;
}
.flatpickr-prev-month svg, 
.flatpickr-next-month svg { 
  fill: var(--brand-gold) !important; 
  stroke: var(--brand-gold) !important; 
}
.flatpickr-prev-month:hover, 
.flatpickr-next-month:hover { 
  background: rgba(255,215,0,0.15) !important; 
  border-radius: 4px !important;
}
.flatpickr-months .flatpickr-month select.flatpickr-monthDropdown-months { 
  background: #001d3d !important; 
  color: var(--brand-gold) !important; 
  border: none !important; 
}

  color: var(--brand-gold) !important;

/* রবিবার লাল */
.flatpickr-day:nth-child(7n+1) { 
  color: #ff4d4d !important; 
  font-weight: 700 !important; 
}
/* হলিডে লাল */
.flatpickr-day.is-holiday { 
  color: #ff4d4d !important; 
  font-weight: 700 !important; 
}
/* রবিবার লাল */
.flatpickr-day:nth-child(7n+1) { color: #ff4d4d !important; font-weight: 700 !important; }
/* হলিডে লাল */
.flatpickr-day.is-holiday { color: #ff4d4d !important; font-weight: 700 !important; }

  /* ── Print ── */
  @media print {
    .hide-on-print { display: none !important; }
    body { background: #fff !important; }
    .main-card { border: none !important; box-shadow: none !important; }
    .filter-section, .summary-bar, .page-header { display: none !important; }
    .table-responsive { overflow: visible !important; }
    .attendance-table thead th { background: #f2f2f2 !important; color: #000 !important; border: 1px solid #000 !important; }
    .grand-total-row td { background: #eee !important; color: #000 !important; border: 1px solid #000 !important; }
    tbody tr:last-child td { page-break-inside: avoid !important; }
  }
</style>
  </head>
  <body id="bodyRoot">
    <div class="container-fluid">
      <div class="main-card">
        <div class="page-header">
          <div class="brand-title">
            <h2>ALAMHOW CO LTD</h2>
            <span>Attendance & Salary Report</span>
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-action btn-outline-success" onclick="showAttendanceFilter()">Attendance Sheet</button>
            <button class="btn btn-action btn-outline-primary" onclick="openPreview()">Salary Report</button>
            <button class="btn btn-action btn-primary" onclick="refreshData()">Refresh</button>
          </div>
        </div>

        <!-- Filters -->
        <div class="filter-section">
          <div class="filter-group" style="grid-column: span 2">
            <label>Search By:</label>
            <div class="search-input-group">
              <select id="searchType" class="form-select form-select-sm" onchange="processData()">
                <option value="ALL">ALL</option>
                <option value="EMPLOYEE ID">ID</option>
                <option value="EMPLOYEE NAME">NAME</option>
                <option value="PASSPORT NO">PASSPORT</option>
              </select>
              <input type="text" id="searchInput" class="form-control form-control-sm" placeholder="Type info..." onkeyup="processData()" />
            </div>
          </div>
          <div class="filter-group">
            <label>Start Date:</label>
            <input type="text" id="startDate" class="form-control form-control-sm custom-date-input" />
          </div>
          <div class="filter-group">
            <label>End Date:</label>
            <input type="text" id="endDate" class="form-control form-control-sm custom-date-input" />
          </div>
          <div class="filter-group">
            <label>Employee NAME:</label>
            <select id="empFilter" class="form-select form-select-sm" onchange="processData()"></select>
          </div>
          <div class="filter-group">
            <button class="btn btn-sm btn-primary btn-action w-100" onclick="handleViewReport()">Search</button>
          </div>
          <div class="filter-group">
            <label>PROJECT NAME:</label>
            <select id="sideFilter" class="form-select form-select-sm" onchange="processData()"></select>
          </div>
          <div class="filter-group">
            <label>Status Filter:</label>
            <select id="columnSelector" class="form-select form-select-sm" onchange="handleTypeChange()">
              <option value="">Select</option>
              <option value="STATUS">STATUS</option>
              <option value="HOLIDAY">HOLIDAY</option>
              <option value="SUNDAY WORK">SUNDAY WORK</option>
            </select>
          </div>
          <div class="filter-group" id="typeValueGroup" style="display: none">
            <label id="typeValueLabel">Value:</label>
            <select id="typeValueSelect" class="form-select form-select-sm" onchange="processData()"></select>
          </div>
          <div class="filter-group">
            <button class="btn btn-sm btn-reset btn-action w-100" onclick="resetFilters()">Clear</button>
          </div>
        </div>

        <div class="summary-bar" id="summaryBar">
          <span>Total Employee: <span id="statEmp" class="stat-box"></span></span>
          <span>Total Present: <span id="statPresent" class="stat-box"></span></span>

          <!-- ══ Working Days Control (নতুন ২) ══ -->
          <div class="wd-badge hide-on-print">
            <label>⚙️ Working Days Input:</label>
            <input type="number" id="manualWDInput" placeholder="Type" min="1" max="31"
              title="Warking Day Manual Input Then Hit The Ok Button" />
            <button onclick="applyManualWD()">✔ OK</button>
            <span class="wd-status" id="wdStatus">⏳ Loading...</span>
          </div>

          <span id="salarySheetTitle" class="ms-auto" style="display:none;font-weight:800;color:#1d3a6d"></span>
        </div>

        <div id="loader">
          <div class="spinner-border spinner-border-sm" role="status"></div>
          <p class="mt-2" style="font-size:11px">Data Loading</p>
        </div>

        <div class="table-responsive">
          <table class="table attendance-table" id="attendanceTable">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
            <tfoot id="tableFoot"></tfoot>
          </table>
        </div>
      </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal fade" id="editModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header bg-dark text-white">
            <h6 class="modal-title">Quick Edit Record</h6>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <form id="editForm">
              <input type="hidden" id="editRowIndex" />
              <p class="mb-3 text-primary fw-bold" id="displayEmpName"></p>
              <div class="row g-2">
                <div class="col-6">
                  <label class="form-label small fw-bold">STATUS</label>
                  <select id="editStatus" class="form-select form-select-sm">
                    <option value="Present">Present</option>
                    <option value="Absent">Absent</option>
                    <option value="Off">Off</option>
                    <option value="Leave">Leave</option>
                  </select>
                </div>
                <div class="col-6">
                  <label class="form-label small fw-bold">OT HOURS</label>
                  <input type="number" id="editOT" class="form-control form-control-sm" step="0.5" />
                </div>
                <div class="col-6">
                  <label class="form-label small fw-bold">HOLIDAY WORK</label>
                  <input type="number" id="editHoliday" class="form-control form-control-sm" step="0.5" />
                </div>
                <div class="col-6">
                  <label class="form-label small fw-bold">ADVANCE AMOUNT</label>
                  <input type="number" id="editAdvance" class="form-control form-control-sm" step="100" />
                </div>
              </div>
            </form>
          </div>
          <div class="modal-footer p-2">
            <button type="button" class="btn btn-light btn-sm" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-primary btn-sm" onclick="saveEdit()">Update</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Attendance Matrix Filter Modal -->
    <div class="modal fade" id="matrixFilterModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header bg-success text-white">
            <h6 class="modal-title">Generate Attendance Report</h6>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="row g-3">
              <div class="col-12">
                <label class="form-label small fw-bold">Select Month & Year</label>
                <input type="text" id="matrixMonth" class="form-control form-control-sm custom-date-input" placeholder="Select Month" />
              </div>
              <div class="col-12">
                <label class="form-label small fw-bold">Select Employee ID (Optional)</label>
                <input list="employeeIdList" id="matrixIdFilter" class="form-control form-control-sm" placeholder="Type or click to select ID" />
                <datalist id="employeeIdList"></datalist>
              </div>
              <div class="col-12">
                <label class="form-label small fw-bold">Filter by Project</label>
                <select id="matrixSideFilter" class="form-select form-select-sm">
                  <option value="">All Project</option>
                </select>
              </div>
            </div>
          </div>
          <div class="modal-footer p-2">
            <button type="button" class="btn btn-light btn-sm" data-bs-dismiss="modal">Close</button>
            <button type="button" class="btn btn-success btn-sm" onclick="generateFilteredAttendanceSheet()">VIEW ATTENDANCE</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/plugins/monthSelect/index.js"></script>

    <!-- Firebase SDK -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
      import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
      import {
        getFirestore, doc, setDoc, getDoc, collection, query,
        getDocs, updateDoc, onSnapshot, collectionGroup, where,
      } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
      import {
        getDatabase, ref, set, get, child, onValue, update,
      } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

      window.initializeApp = initializeApp;
      window.getAuth = getAuth; window.signInAnonymously = signInAnonymously;
      window.getFirestore = getFirestore; window.doc = doc; window.setDoc = setDoc;
      window.getDoc = getDoc; window.collection = collection; window.query = query;
      window.getDocs = getDocs; window.updateDoc = updateDoc;
      window.onSnapshot = onSnapshot; window.collectionGroup = collectionGroup; window.where = where;
      window.getDatabase = getDatabase; window.dbRef = ref; window.dbSet = set;
      window.dbGet = get; window.dbChild = child; window.dbOnValue = onValue; window.dbUpdate = update;
      initFirebaseAndLoad();
    </script>

    <script>
      let rawData = [];
      let colIndexMap = {};
      let rtdbOvertimeMap = {};
      let rtdbAdvanceMap  = {};
      let globalEmployeeListMap = {};

      // ══════════════════════════════════════════════════════
      // নতুন ১ — Holiday Set
      // Firebase HOLIDAY_LIST কালেকশন থেকে লোড হবে
      // ══════════════════════════════════════════════════════
      let _holidaySet = new Set();

      // ══════════════════════════════════════════════════════
      // নতুন ২ — Working Days ক্যালকুলেশন
      //   সাধারণ কর্মচারী: Basic ÷ (মোট দিন − রবিবার − পাবলিক হলিডে)
      //   Cook:             Basic ÷ মাসের মোট দিন
      // ══════════════════════════════════════════════════════
      let _autoWorkingDays = 26; // Firebase লোডের আগে fallback
      let _manualWD = null;       // ম্যানুয়াল ওভাররাইড

      // একটি মাসের কার্যদিবস হিসাব করা (রবিবার + পাবলিক হলিডে বাদে)
      function calcWorkingDays(dateStr) {
        const d     = new Date(dateStr);
        const year  = d.getFullYear();
        const month = d.getMonth();
        const total = new Date(year, month + 1, 0).getDate();

        let sundays = 0;
        for (let i = 1; i <= total; i++) {
          if (new Date(year, month, i).getDay() === 0) sundays++;
        }

        let holidays = 0;
        _holidaySet.forEach(hd => {
          const hDate = new Date(hd);
          if (hDate.getFullYear() === year && hDate.getMonth() === month) {
            if (hDate.getDay() !== 0) holidays++; // রবিবার পড়লে দুইবার বাদ না দিতে
          }
        });

        return total - sundays - holidays;
      }

          document.getElementById("wdStatus").textContent = "✅ Manual: " + _manualWD + " days";
          return;
        }
        const wd = calcWorkingDays(dateStr);
        _autoWorkingDays = wd;
        document.getElementById("wdStatus").textContent = "⚡ " + wd + " days";
      }

      function getDailyRate(salary, designation, dateStr) {
        const des = (designation || "").trim().toUpperCase();
        if (des === "COOK") {
          if (dateStr) {
            const d = new Date(dateStr);
            if (!isNaN(d.getTime())) {
              const daysInMonth = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
              return parseFloat((salary / daysInMonth).toFixed(2));
            }
          }
          return parseFloat((salary / 30).toFixed(2));
        }
        const workingDays = (_manualWD && _manualWD > 0) ? _manualWD : _autoWorkingDays;
        return parseFloat((salary / workingDays).toFixed(2));

      function standardDateStr(s) {
        if (!s) return "";
        s = s.toString().trim();
        const dd = s.match(/^(\d{1,2})[-/](\d{1,2})[-/](\d{4})$/);
        if (dd) return `${dd[3]}-${dd[2].padStart(2,"0")}-${dd[1].padStart(2,"0")}`;
        const yy = s.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})/);
        if (yy) return `${yy[1]}-${yy[2].padStart(2,"0")}-${yy[3].padStart(2,"0")}`;
        return s;
      }
      function normalizeDateKey(v) { return standardDateStr(v) || ""; }

      async function setupOneTimeFetch(startDate, endDate) {
        const [otSnap, advSnap] = await Promise.all([
          window.dbGet(window.dbRef(window.rtdb, "OVER_TIME")),
          window.dbGet(window.dbRef(window.rtdb, "ADVANCE")),
        ]);

        rtdbOvertimeMap = {};
        if (otSnap.exists()) {
          const otData = otSnap.val();
          Object.keys(otData).forEach(monthYear => {
            const dates = otData[monthYear]; if (!dates || typeof dates !== "object") return;
            Object.keys(dates).forEach(dateKey => {
              const docs = dates[dateKey]; if (!docs || typeof docs !== "object") return;
              Object.keys(docs).forEach(docId => {
                const rec = docs[docId]; if (!rec) return;
                const empId  = rec.ID || rec.id;
                const otDate = rec.OT_Date || rec.otDate || dateKey;
                const otHrs  = parseFloat(rec.TOTAL_OT_HOURS) || 0;
                const otRate = parseFloat(rec.OT_Rate || rec.OT_RATE) || 0;
                if (empId && otDate && otDate >= startDate && otDate <= endDate) {
                  const cId = empId.toUpperCase().trim();
                  const cDate = normalizeDateKey(otDate);
                  if (!rtdbOvertimeMap[cId]) rtdbOvertimeMap[cId] = {};
                  rtdbOvertimeMap[cId][cDate] = { hours: otHrs, rate: otRate };
                }
              });
            });
          });
        }

        rtdbAdvanceMap = {};
        if (advSnap.exists()) {
          const advData = advSnap.val();
          Object.keys(advData).forEach(monthYear => {
            const dates = advData[monthYear]; if (!dates || typeof dates !== "object") return;
            Object.keys(dates).forEach(dateKey => {
              const docs = dates[dateKey]; if (!docs || typeof docs !== "object") return;
              Object.keys(docs).forEach(docId => {
                const rec = docs[docId]; if (!rec) return;
                const empId   = rec.id || rec.ID;
                const recDate = rec.recordDate || dateKey;
                const amt     = parseFloat(rec.amount) || 0;
                if (empId && recDate) {
                  const cId   = empId.toUpperCase().trim();
                  const cDate = normalizeDateKey(recDate);
                  if (cDate) {
                    if (!rtdbAdvanceMap[cId]) rtdbAdvanceMap[cId] = {};
                    rtdbAdvanceMap[cId][cDate] = amt;
                  }
                }
              });
            });
          });
        }

        try {
          const attQuery = window.query(
            window.collectionGroup(window.db, "Present_Absent"),
            window.where("DATE", ">=", startDate),
            window.where("DATE", "<=", endDate),
          );
          const fsSnap = await window.getDocs(attQuery);
          if (fsSnap.empty) {
            rawData = [FIXED_HEADERS];
          } else {
            let docs = [];
            fsSnap.forEach(d => docs.push({ id: d.id, path: d.ref.path, data: d.data() }));
            rawData = convertDocsToRawData(docs);
          }
          mapSheetColumns(rawData[0]);
          populateStaticFilters(rawData);
          processData();
        } catch(err) {
          console.error("Firestore fetch failed:", err);
          Swal.fire("Error", "ডাটা ফেচ করতে সমস্যা হয়েছে।", "error");
        }
      }

      function convertDocsToRawData(attendanceDocs) {
        const data = [FIXED_HEADERS];
        attendanceDocs.forEach(docObj => {
          const item = docObj.data;
          const segs = docObj.path.split("/");
          let dateFromPath = "2026-04-01";
          for (let i = 0; i < segs.length; i++) {
            if (segs[i].startsWith("DATE_")) { dateFromPath = segs[i].replace("DATE_",""); break; }
          }
          const empId = (item.ID || "ACL-0000").toUpperCase().trim();
          const dateKey = item.DATE || dateFromPath;
          const stdDate = normalizeDateKey(dateKey);
          const gEmp    = globalEmployeeListMap[empId] || {};

          const docBasicSalary = (gEmp.salary > 0) ? gEmp.salary : (item.SALARY || item.salary || 0);
          const docOtRate      = (gEmp.otRate > 0)  ? gEmp.otRate  : (item.OT_RATE || item.ot_rate || item["OT RATE"] || 0);

          let otHours = item.TOTAL_OT_HOURS || item.OT_HOURS || 0;
          if (rtdbOvertimeMap[empId]?.[stdDate] !== undefined) {
            const oi = rtdbOvertimeMap[empId][stdDate];
            otHours = typeof oi === "object" ? oi.hours : parseFloat(oi) || 0;
          }

          let advanceAmt = item.ADVANCE || 0;
          if (rtdbAdvanceMap[empId]?.[stdDate] !== undefined) {
            advanceAmt = parseFloat(rtdbAdvanceMap[empId][stdDate]) || 0;
          }

          const mappedItem = {
            "ISSUE DATE": dateKey,
            "ISSUE TIME": item.SYNC_TIME ? new Date(item.SYNC_TIME.seconds * 1000).toLocaleTimeString() : "12:00:00",
            "ATTENDANCE DATE": dateKey,
            "EMPLOYEE ID": empId,

            "DESIGNATION": gEmp.designation || item.DESIGNATION || "WORKER",

            "JOINING DATE": gEmp.joining  || item.JOINING_DATE || "",
            "BASIC SALARY": docBasicSalary,
            "OT RATE": docOtRate,

            "SUNDAY WORK":  item.SUNDAY_WORK  ?? item.sunday_work  ?? 0,

            "STATUS": item.STATUS || "Present",
            "SIDE NAME": item.SIDE_NAME || "MAIN SITE",
            "REMARK": item.REMARK || "",
          };
          const row = FIXED_HEADERS.map(h => mappedItem[h] ?? "");
          row._docId = docObj.id; row._fullPath = docObj.path;
          data.push(row);
        });
        return data;
      }

      function mergeMissingRtdbRecords(currentRows) {
        const presentIds = new Set();
        const eIdx = colIndexMap["EMPLOYEE ID"], dIdx = colIndexMap["ATTENDANCE DATE"];
        currentRows.forEach(row => {
          const id = row[eIdx]?.toString().toUpperCase().trim();
          if (id) presentIds.add(id);
        });
        Object.keys(rtdbOvertimeMap).forEach(empId => {
          const cId = empId.toUpperCase().trim();

              const rtdbRate = typeof oi === "object" ? oi.rate : 0;

                const gEmp = globalEmployeeListMap[cId] || {};

                newRow._docId = `MISSING_${cId}_${dateStr}`; newRow._fullPath = "";

            });
          }
        });
        Object.keys(rtdbAdvanceMap).forEach(empId => {
          const cId = empId.toUpperCase().trim();

            Object.keys(rtdbAdvanceMap[empId]).forEach(dateStr => {

                if (!alreadyAdded) {

                  const newRow = Array(FIXED_HEADERS.length).fill("");

      function processData() {

        if (startDate) startDate.setHours(0,0,0,0);
        let endDate = endStr ? new Date(endStr) : null;
        if (endDate) endDate.setHours(23,59,59,999);

        const search     = document.getElementById("searchInput").value.toLowerCase();
        const searchType = document.getElementById("searchType").value;
        const fEmp   = document.getElementById("empFilter").value;
        const fSide  = document.getElementById("sideFilter").value;
        const fType  = document.getElementById("columnSelector").value;
        const fTypeVal = document.getElementById("typeValueSelect").value.toLowerCase();

        const titleSpan = document.getElementById("salarySheetTitle");
        if (startStr && endStr) { titleSpan.innerText = `Records: ${startStr} to ${endStr}`; titleSpan.style.display = "inline"; }
        else titleSpan.style.display = "none";

        const dIdx = colIndexMap["ATTENDANCE DATE"] || colIndexMap["ISSUE DATE"];
        const eIdx = colIndexMap["EMPLOYEE ID"];
        const sIdx = colIndexMap["SIDE NAME"];

        let filteredRows = rawData.slice(1).filter(row => {
          const rId   = row[eIdx]?.toString().toUpperCase() || "";
          const rSide = row[sIdx]?.toString().toUpperCase() || "";
          const rDate = parseDate(row[dIdx]);
          const cDate = new Date(rDate.getTime()); cDate.setHours(0,0,0,0);
          let match = true;
          if (startDate && cDate < startDate) match = false;
          if (match && endDate && cDate > endDate) match = false;
          if (match && search) {
            match = searchType === "ALL"
              ? row.join(" ").toLowerCase().includes(search)
              : (row[colIndexMap[searchType]] || "").toString().toLowerCase().includes(search);
          }
          if (match && fEmp  && rId   !== fEmp)  match = false;
          if (match && fSide && rSide !== fSide)  match = false;
          if (match && fType && fTypeVal) {
            if ((row[colIndexMap[fType]] || "").toString().toLowerCase() !== fTypeVal) match = false;
          }
          return match;
        });

        mergeMissingRtdbRecords(filteredRows);
        filteredRows.sort((a, b) => parseDate(b[dIdx]) - parseDate(a[dIdx]));

        const isSummary = startStr || endStr || fEmp || fSide || (fType && fTypeVal);

              else if (h === "GROS SALARY")   val = gross.toFixed(2);
              else if (h === "NEED SALARY")   val = needSal.toFixed(2);
              else if (h === "ADVANCE")       val = adv > 0 ? adv.toFixed(0) : "-";
              else if (typeof val === "number") val = val.toFixed(2);
              if (val === undefined || val === null || val === "") val = "-";
              let bg = h === "STATUS" ? "background-color:#dcfce7;font-weight:500;" : "";
              let cell = `<td class="${align}" style="white-space:nowrap;padding:4px 8px;${bg}">${val}</td>`;
              if (h === "BASIC SALARY" || h === "BASIC SALARY ") {
                cell = `<td class="text-end" style="background-color:#f0fdf4;font-weight:bold;white-space:nowrap;padding:4px 8px;">${dailyRate.toFixed(2)}</td>` + cell;

          const gross = actB + otA + emp.holAmt + emp.sunAmt + emp.attBonus + emp.perfBonus;
          const nps   = gross * 0.01, csg = gross * 0.015;
          const need  = gross - (emp.adv + emp.fine + nps + csg);

              tsTime: new Date().toLocaleTimeString("en-US",{hour12:false}),

      function parseDate(s) {
        if (!s && s !== 0) return new Date(0);
        if (s instanceof Date) return s;
        const str = s.toString().trim();
        if (!str || str === "-") return new Date(0);
        let ds = str.replace(/\//g,"-");
        const p = ds.split("-");
        if (p.length === 3) {
          if (p[0].length === 4) return new Date(p[0], p[1]-1, p[2]);
          if (p[2].length === 4) return new Date(p[2], p[1]-1, p[0]);
        }
        const fd = new Date(ds);
        return isNaN(fd.getTime()) ? new Date(0) : fd;
      }

      function generateFilteredAttendanceSheet() {
        const monthInput = document.getElementById("matrixMonth").value;
        const sideFilter = document.getElementById("matrixSideFilter").value;
        if (!monthInput) { alert("Please select a month."); return; }

        const [year, month0] = monthInput.split("-").map(Number);
        const month    = month0 - 1;
        const firstDay = new Date(year, month, 1);
        const lastDay  = new Date(year, month+1, 0);
        const dateRange = [];
        for (let d = new Date(firstDay); d <= lastDay; d.setDate(d.getDate()+1)) dateRange.push(new Date(d));

        // ══ Holiday set থেকেও পাবলিক হলিডে (নতুন) ══
        const publicHolidayDates = new Set();
        rawData.slice(1).forEach(row => {
          const dRaw = parseDate(row[colIndexMap["ATTENDANCE DATE"]]);
          const rem  = (row[colIndexMap["REMARK"]] || "").toString().toUpperCase();
          if (dRaw && (rem.includes("HOLIDAY") || rem.includes("PUBLIC HOLIDAY")))
            publicHolidayDates.add(dRaw.toISOString().split("T")[0]);
        });
        _holidaySet.forEach(hd => {
          const hDate = new Date(hd);
          if (hDate.getFullYear() === year && hDate.getMonth() === month)
            publicHolidayDates.add(hd);
        });

        const now = new Date();
        const printDT = now.toLocaleString("en-GB",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit",hour12:true});

        const attendanceMap = {}, employees = {};
        rawData.slice(1).forEach(row => {
          const id    = row[colIndexMap["EMPLOYEE ID"]];
          const dRaw  = parseDate(row[colIndexMap["ATTENDANCE DATE"]]);
          const rSide = (row[colIndexMap["SIDE NAME"]] || "").toString().toUpperCase();
          if (!id || !dRaw) return;
          if (dRaw.getFullYear() === year && dRaw.getMonth() === month) {
            if (sideFilter && rSide !== sideFilter.toUpperCase()) return;
            const ds = dRaw.toISOString().split("T")[0];
            if (!employees[id]) employees[id] = row[colIndexMap["EMPLOYEE NAME"]];
            if (!attendanceMap[id]) attendanceMap[id] = {};
            let st = (row[colIndexMap["STATUS"]] || "").toString().trim().toUpperCase();
            let shortStat = "-";
            if (isPresent(st))          shortStat = "P";
            else if (st.startsWith("A")) shortStat = "A";
            else if (st.startsWith("L")) shortStat = "L";
            else if (st.startsWith("H")) shortStat = "H";
            attendanceMap[id][ds] = {
              stat:    shortStat,
              sunWork: parseFloat(row[colIndexMap["SUNDAY WORK"]]) || 0,
              holWork: parseFloat(row[colIndexMap["HOLIDAY"]])     || 0,
            };
          }
        });

        const monthName = firstDay.toLocaleString("default",{month:"long"});
        const sortedIds = Object.keys(employees).sort((a,b) => a.localeCompare(b,undefined,{numeric:true}));
        let dayTotalsP = Array(dateRange.length).fill(0);
        let dayTotalsSun = Array(dateRange.length).fill(0);
        let dayTotalsHol = Array(dateRange.length).fill(0);
        let dayTotalsA   = Array(dateRange.length).fill(0);
        let gP=0, gA=0, gSun=0, gHol=0;

        const tableHeader = `<thead>
          <tr style="height:22px;">
            <th rowspan="2" style="width:20px;padding:1px;">SL</th>
            <th rowspan="2" style="width:160px;padding:1px;">EMPLOYEE ID &amp; Name</th>
            <th colspan="${dateRange.length}" style="padding:0 10px;font-size:11px;">
              <div style="display:flex;justify-content:space-between;align-items:center;width:100%;">
                <div style="flex:2;text-align:center;font-weight:bold;">Attendance Summary: ${monthName} ${year}${sideFilter ? ` - ${sideFilter.toUpperCase()}` : " - ALL PROJECT"}</div>
                <div style="flex:1;text-align:right;font-size:9px;font-weight:normal;">Printed on: ${printDT}</div>
              </div>
            </th>
            <th colspan="4" style="background:#0d685b;padding:1px;font-size:10px;">SUMMARY</th>
          </tr>
          <tr style="height:35px;">
            ${dateRange.map(d => {
              const dn  = d.toLocaleDateString("en-US",{weekday:"short"}).substring(0,2);
              const isSun = d.getDay() === 0;
              const isPH  = publicHolidayDates.has(d.toISOString().split("T")[0]);
              const hs  = isSun || isPH ? "color:#ff4d4d!important;" : "";
              if (isPH) return `<th style="width:25px;padding:1px 0;vertical-align:middle;${hs}">
                <div style="width:25px;height:25px;margin:0 auto;">
                  <svg viewBox="0 0 100 100" style="width:100%;height:100%;">
                    <circle cx="50" cy="50" r="47" style="fill:none;stroke:#ff4d4d;stroke-width:6;"/>
                    <path id="c${d.getDate()}" d="M 15,55 A 35,35 0 0,1 85,55" fill="transparent"/>
                    <text style="fill:#ff4d4d;font-weight:900;font-size:16px;"><textPath xlink:href="#c${d.getDate()}" startOffset="50%" text-anchor="middle">Holiday</textPath></text>
                    <text x="50" y="62" style="fill:#ff4d4d;font-weight:bold;text-anchor:middle;font-size:40px;">${d.getDate()}</text>
                    <text x="50" y="88" style="fill:#ff4d4d;font-weight:bold;text-anchor:middle;font-size:24px;">${dn}</text>
                  </svg>
                </div></th>`;
              return `<th style="width:25px;padding:1px 0;vertical-align:middle;${hs}">
                <div style="line-height:1;">${d.getDate()}<br><span style="font-size:7px">${dn}</span></div></th>`;
            }).join("")}
            <th style="width:25px;background:#198754;padding:1px;">P</th>
            <th style="width:25px;background:#dc3545;padding:1px;">A</th>
            <th style="width:25px;background:#ffc107;color:#000;padding:1px;">SUN</th>
            <th style="width:25px;background:#6c757d;padding:1px;">HOL</th>
          </tr>
        </thead>`;

        const tableBody = sortedIds.map((id, idx) => {
          let cP=0, cA=0, cSun=0, cHol=0;
          const daysHtml = dateRange.map((d, di) => {
            const ds   = d.toISOString().split("T")[0];
            const isSun = d.getDay() === 0;
            const isPH  = publicHolidayDates.has(ds);
            const att   = attendanceMap[id]?.[ds] || null;
            const stat  = att ? att.stat    : "-";
            const sw    = att ? att.sunWork : 0;
            const hw    = att ? att.holWork : 0;
            if (stat === "P") {
              if (sw > 0)      { dayTotalsSun[di]++; cSun++; }
              else if (hw > 0) { dayTotalsHol[di]++; cHol++; }
              else              { dayTotalsP[di]++;   cP++;   }
            }
            if (stat === "A") { dayTotalsA[di]++; cA++; }
            if (isSun || isPH) {
              const bg  = isSun ? "#fff0f0" : "#fff9e6";
              const tc  = stat === "P" ? "#16a34a" : stat === "A" ? "#cc0000" : isSun ? "#cc0000" : "#b45309";
              return `<td style="background-color:${bg};color:${tc};font-weight:bold;border:1px solid #000;">${stat !== "-" ? stat : ""}</td>`;
            }
            if (stat === "P") return `<td style="color:#16a34a;font-weight:bold;">P</td>`;
            if (stat === "A") return `<td style="background:#fef9c3;color:#cc0000;font-weight:bold;">A</td>`;
            if (stat === "H" || stat === "L") return `<td style="color:#1d4ed8;font-weight:bold;">${stat}</td>`;
            return `<td></td>`;
          }).join("");
          gP+=cP; gA+=cA; gSun+=cSun; gHol+=cHol;
          return `<tr>
            <td>${idx+1}</td>
            <td class="text-start">${id} - ${employees[id]}</td>
            ${daysHtml}
            <td style="font-weight:bold;background:#e6fffa;color:#065f46;">${cP}</td>
            <td style="font-weight:bold;background:#fff0f0;color:#991b1b;">${cA}</td>
            <td style="font-weight:bold;background:#fff9e6;color:#92400e;">${cSun}</td>
            <td style="font-weight:bold;background:#ede9fe;color:#5b21b6;">${cHol}</td>
          </tr>`;
        }).join("");

        const tableFooter = `<tr>
          <td colspan="2" style="text-align:left;padding:4px 8px;font-weight:bold;background:#1d3a6d;color:#ffd700;">DAILY TOTAL</td>
          ${dayTotalsP.map((_,i) => {
            const all = dayTotalsP[i]+dayTotalsSun[i]+dayTotalsHol[i];
            return `<td style="text-align:center;font-weight:bold;background:#f8f9fa;font-size:9px;">${all||""}</td>`;
          }).join("")}
          <td style="font-weight:bold;background:#e6fffa;color:#065f46;">${gP}</td>
          <td style="font-weight:bold;background:#fff0f0;color:#991b1b;">${gA}</td>
          <td style="font-weight:bold;background:#fff9e6;color:#92400e;">${gSun}</td>
          <td style="font-weight:bold;background:#ede9fe;color:#5b21b6;">${gHol}</td>
        </tr>`;

        const preview = window.open("","_blank");
        preview.document.write(`<!DOCTYPE html><html><head>
          <title>Attendance Summary</title>
          <style>
            *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
            @page{size:A4 landscape;margin:5mm 5mm 0mm 5mm;}
            body{font-family:sans-serif;padding:10px;margin:0;zoom:1.4;}
            .co-name{text-align:center;margin:0;font-size:26px;font-weight:bold;
              background:linear-gradient(135deg,#bf953f 0%,#fcf6ba 25%,#b38728 50%,#fbf5b7 75%,#aa771c 100%);
              -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
            table{width:100%;border-collapse:collapse;table-layout:fixed;border:1.2px solid #000;margin-top:10px;}
            th,td{border:1px solid #000;text-align:center;font-size:10px;padding:1px 0;}
            th{background:#1d3a6d;color:#fff;}
            .text-start{text-align:left!important;padding-left:5px;white-space:nowrap;overflow:hidden;}
            .no-print{position:fixed;top:10px;right:10px;padding:10px;background:#002147;color:#ffd700;border:2px solid #ffd700;border-radius:5px;cursor:pointer;z-index:1000;font-weight:bold;}
            .sig-row{display:flex;justify-content:space-between;margin-top:40px;padding:0 40px;}
            .sig-item{border-top:1px solid #000;width:140px;text-align:center;font-size:10px;font-weight:bold;padding-top:4px;}
            @media print{body{zoom:0.95;}th,td{font-size:8.5px;}.no-print{display:none;}}
          </style>
        </head><body>
          <button class="no-print" onclick="window.print()">🖨️ Print Report</button>
          <h1 class="co-name">ALAMHOW CO LTD</h1>
          <table>${tableHeader}<tbody>${tableBody}</tbody><tfoot>${tableFooter}</tfoot></table>
          <table style="margin-top:14px;border-collapse:collapse;width:auto;min-width:240px;">
            <thead><tr><th colspan="2" style="background:#1d3a6d;color:#ffd700;padding:4px 10px;font-size:11px;text-align:left;">PRESENT SUMMARY</th></tr></thead>
            <tbody>
              <tr style="background:#f0fff4;"><td style="padding:3px 10px;font-weight:bold;border:1px solid #ccc;">Total Normal Working Days</td><td style="font-weight:bold;width:60px;border:1px solid #ccc;text-align:center;">${gP}</td></tr>
              <tr style="background:#fffbeb;"><td style="padding:3px 10px;font-weight:bold;color:#b58900;border:1px solid #ccc;">Total Sunday Working Days</td><td style="font-weight:bold;color:#b58900;border:1px solid #ccc;text-align:center;">${gSun}</td></tr>
              <tr style="background:#f5f3ff;"><td style="padding:3px 10px;font-weight:bold;border:1px solid #ccc;">Total Holiday Working Days</td><td style="font-weight:bold;border:1px solid #ccc;text-align:center;">${gHol}</td></tr>
              <tr style="background:#fff0f0;"><td style="padding:3px 10px;font-weight:bold;color:red;border:1px solid #ccc;">Total Absent</td><td style="font-weight:bold;color:red;border:1px solid #ccc;text-align:center;">${gA}</td></tr>
            </tbody>
          </table>
          <div class="sig-row">
            <div class="sig-item">Prepared By</div>
            <div class="sig-item">Checked By</div>
            <div class="sig-item">Authorized Signature</div>
          </div>
        </body></html>`);
        preview.document.close();
      }
    </script>
  </body>
</html>
