<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Over Time Report</title>
    <link rel="icon" type="image/png" href="https://drive.google.com/thumbnail?id=11bxOPboUUmQxIkT6gMYWYqxfh9jZSiLo&sz=w500">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap');

        :root {
            --navy: #0f2460;
            --navy-dark: #091847;
            --navy-mid: #1a3578;
            --navy-light: #1e3a8a;
            --navy-pale: #e8edf8;
            --gold: #d4a017;
            --gold-bright: #f5b700;
            --gold-light: #fef3c7;
            --gold-pale: #fffbeb;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f2460 0%, #1a3578 50%, #0f2460 100%);
            min-height: 100vh;
            color: #1e293b;
        }

        /* ── Loading Overlay ── */
        #initial-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: linear-gradient(135deg, var(--navy-dark), var(--navy-light));
            display:flex; flex-direction:column; justify-content:center; align-items:center;
            z-index:9999; gap:16px;
        }
        .loader-spinner {
            border: 3px solid rgba(212,160,23,0.3);
            border-top: 3px solid var(--gold-bright);
            border-radius:50%; width:48px; height:48px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }
        #initial-overlay p { color: var(--gold-light); font-size:11px; letter-spacing:3px; text-transform:uppercase; font-weight:700; }

        /* ── App Container ── */
        #app-container { display:none; }

        /* ── Header ── */
        .app-header {
            background: linear-gradient(90deg, var(--navy-dark) 0%, var(--navy-mid) 60%, var(--navy-dark) 100%);
            border-bottom: 3px solid var(--gold);
            padding: 16px 24px;
            display:flex; justify-content:space-between; align-items:center;
            gap:16px; flex-wrap:wrap;
            border-radius: 16px 16px 0 0;
        }
        .app-header h1 {
            font-size:22px; font-weight:900; color:white;
            letter-spacing:1px; text-transform:uppercase; line-height:1;
        }
        .app-header .subtitle {
            font-size:10px; font-weight:700; color:var(--gold-bright);
            text-transform:uppercase; letter-spacing:2px; margin-top:4px;
        }
        .brand-logo { height:56px; width:auto; object-fit:contain; filter: brightness(1.1); }

        /* ── Period Badge ── */
        .period-badge {
            background: rgba(212,160,23,0.15);
            border: 1px solid var(--gold);
            color: var(--gold-bright);
            padding: 6px 14px; border-radius:20px;
            font-size:11px; font-weight:700; letter-spacing:0.5px;
        }

        /* ── Print Button ── */
        .print-btn {
            background: linear-gradient(135deg, var(--gold), var(--gold-bright));
            color: var(--navy-dark); border:none;
            padding: 7px 16px; border-radius:20px;
            font-size:11px; font-weight:800; text-transform:uppercase;
            cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:6px;
            box-shadow: 0 2px 8px rgba(212,160,23,0.4);
        }
        .print-btn:hover { transform:translateY(-1px); box-shadow:0 4px 14px rgba(212,160,23,0.5); }

        /* ── Filter Section ── */
        /* ── Filter Section ── */
.filter-section {
    background: var(--navy-pale);
    border-bottom: 2px solid rgba(212,160,23,0.3);
    padding: 18px 24px;
    overflow: visible;   /* ← এটা যোগ করুন */
    position: relative;  /* ← এটা যোগ করুন */
}

        .filter-label {
            display:block; text-transform:uppercase;
            font-weight:800; color: var(--navy-dark);
            font-size:11px; margin-bottom:6px; letter-spacing:0.5px;
        }
        .filter-input {
            width:100%; padding:10px 12px;
            background:white; border: 1.5px solid #c7d2e8;
            border-radius:8px; outline:none;
            font-size:13px; font-weight:500; color: var(--navy-dark);
            transition:all 0.2s;
        }
        .filter-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(212,160,23,0.15);
        }
        .filter-input:hover { border-color: var(--navy-light); }

        /* ── Buttons ── */
        .btn-view {
            width:100%; height:44px;
            background: linear-gradient(135deg, var(--navy-dark), var(--navy-light));
            color:white; border:none; border-radius:8px;
            font-size:12px; font-weight:800; text-transform:uppercase;
            cursor:pointer; transition:all 0.2s; letter-spacing:0.5px;
            box-shadow: 0 2px 8px rgba(15,36,96,0.3);
        }
        .btn-view:hover { background: linear-gradient(135deg, var(--navy-mid), var(--navy-dark)); transform:translateY(-1px); }

        .btn-breakdown {
            height:44px; padding:0 14px;
            background: linear-gradient(135deg, var(--gold), var(--gold-bright));
            color: var(--navy-dark); border:none; border-radius:8px;
            font-size:11px; font-weight:800; text-transform:uppercase;
            cursor:pointer; transition:all 0.2s; white-space:nowrap;
            box-shadow: 0 2px 8px rgba(212,160,23,0.3);
        }
        .btn-breakdown:hover { transform:translateY(-1px); box-shadow:0 4px 12px rgba(212,160,23,0.4); }

        /* ── Suggestion Box ── */
        .suggestion-box {
            position:absolute; top:100%; left:0;
            background:white; border:1.5px solid var(--gold);
            border-radius:8px; box-shadow:0 10px 25px rgba(15,36,96,0.2);
            z-index:999; display:none; width:100%; max-height:250px; overflow-y:auto;
        }
        .suggestion-item {
            padding:10px 12px; cursor:pointer; border-bottom:1px solid #f1f5f9;
            font-size:12px; display:flex; justify-content:space-between; align-items:center;
            transition:background 0.15s;
        }
        .suggestion-item:hover { background:var(--gold-pale); }
        .suggestion-item b { color: var(--navy-dark); }

        
/* ── Custom Calendar ── */

       .custom-calendar { position:fixed; background:#001d3d; border:2px solid var(--gold-bright) !important; border-radius:12px; padding:14px; z-index:9999; display:none; width:300px; box-shadow:0 20px 40px rgba(0,0,0,0.4); }
.cal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; padding-bottom:10px; border-bottom:2px solid var(--gold); }
.cal-nav { background:var(--navy-dark); border:2px solid var(--gold-bright); border-radius:6px; width:30px; height:30px; cursor:pointer; font-weight:700; color:var(--gold-bright); transition:all 0.15s; font-size:13px; }
.cal-nav:hover { background:var(--gold-bright); color:var(--navy-dark); }
.cal-month { font-size:14px; font-weight:900; color:var(--gold-bright); }
.cal-days-header { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; margin-bottom:6px; }
.cal-days-header div { text-align:center; font-size:10px; font-weight:700; color:var(--gold-bright); padding:4px 0; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
.calendar-day-cell { padding:8px 0; font-size:13px; cursor:pointer; text-align:center; border-radius:6px; transition:all 0.15s; color:var(--gold-light); }
.calendar-day-cell:hover { background:var(--gold-bright) !important; color:var(--navy-dark) !important; }
.cal-selected { background:var(--navy-dark) !important; color:var(--gold-bright) !important; font-weight:800; border:1px solid var(--gold-bright); }
.cal-today { background:var(--gold-bright) !important; color:var(--navy-dark) !important; font-weight:900; box-shadow:0 0 8px rgba(245,183,0,0.6); border-radius:6px; }


        /* ── Main Content ── */
        .main-content { padding:20px 24px; background:#f8faff; }

        /* ── Table ── */
        .table-container {
            overflow-x:auto; border-radius:10px;
            border:2px solid rgba(15,36,96,0.15);
            box-shadow:0 4px 20px rgba(15,36,96,0.1);
            scrollbar-width:thin; scrollbar-color: var(--gold) var(--navy-pale);
        }
        table { border-collapse:separate; border-spacing:0; width:100%; white-space:nowrap; }
        th, td { border:1px solid #dde4f0; padding:9px 8px; text-align:center; font-size:12.5px; }

        /* Sticky cols */
        .sticky-sl   { position:sticky; left:0;    background:white; z-index:21; min-width:42px; }
        .sticky-id   { position:sticky; left:42px;  background:white; z-index:21; min-width:82px; }
        .sticky-name {
            position:sticky; left:124px; background:white; z-index:21;
            min-width:185px; text-align:left;
            border-right:2px solid var(--gold) !important;
        }
        thead th.sticky-sl, thead th.sticky-id, thead th.sticky-name {
            background: var(--navy-dark); color:white; z-index:30;
        }

        /* Header row */
        thead tr { background: var(--navy-dark); }
        thead th {
            color:white; font-weight:700; font-size:11px;
            text-transform:uppercase; letter-spacing:0.3px;
            border-color: rgba(255,255,255,0.15) !important;
        }

        /* Total column */
        .total-col {
            position:sticky; right:0; background:#fffbeb;
            z-index:20; font-weight:800; color: var(--navy-dark);
            border-left:2px solid var(--gold) !important;
        }
        thead th.total-col { background: var(--gold); color: var(--navy-dark); }

        /* Sunday column */
        .sun-col { background:#fff5f5; color:#dc2626; }

        /* Body rows */
        tbody tr:nth-child(even) td { background:#f5f7ff; }
        tbody tr:nth-child(even) td.sticky-sl,
        tbody tr:nth-child(even) td.sticky-id,
        tbody tr:nth-child(even) td.sticky-name { background:#f5f7ff; }
        tbody tr:hover td { background: var(--gold-pale) !important; }
        tbody tr:hover td.sticky-sl,
        tbody tr:hover td.sticky-id,
        tbody tr:hover td.sticky-name { background: var(--gold-pale) !important; }

        .id-cell { color: var(--navy-dark); font-weight:800; }

        /* Footer */
        tfoot td {
            background: var(--navy-pale); font-weight:800;
            color: var(--navy-dark); font-size:12px;
            border-top:2px solid var(--gold) !important;
        }
        tfoot td.total-col { background: var(--navy-dark); color:white; }

        /* ── Breakdown Table ── */
        .breakdown-head th {
            background: var(--navy-dark); color:white;
            font-size:11px; text-transform:uppercase; letter-spacing:0.3px;
            padding:11px 8px;
        }
        .breakdown-head th:last-child { background: var(--gold); color: var(--navy-dark); font-weight:800; }
        .breakdown-body tr:nth-child(even) td { background:#f5f7ff; }
        .breakdown-body tr:hover td { background: var(--gold-pale) !important; }
        .breakdown-foot td {
            background: var(--navy-dark); color:white; font-weight:800; font-size:13px;
        }
        .breakdown-foot td:last-child { background: var(--gold); color: var(--navy-dark); }

        /* ── Print ── */
        .print-only { display:none; }

        @media print {
            /* ১. পেজ সেটআপ: ল্যান্ডস্কেপ এবং মার্জিন মিনিমাম */
            @page { 
                size: A4 landscape; 
                margin: 0.2cm 0.3cm; 
            }
            
            /* ২. ব্যাকগ্রাউন্ড কালার সাদা ও টেক্সট কালো করা */
            body { 
                background: white !important; 
                color: black !important; 
                padding: 0 !important; 
                margin: 0 !important; 
            }
            
            /* ৩. গোল্ডেন বা অন্য কোনো দাগের উৎস এবং বাটন পুরোপুরি গায়েব করা */
            #initial-overlay, 
            .no-print, 
            .app-header, 
            .filter-section, 
            #idSuggestions, 
            .custom-calendar,
            .suggestion-box,
            .btn-print { 
                display: none !important; 
                visibility: hidden !important;
                opacity: 0 !important;
                height: 0 !important;
                margin: 0 !important;
                padding: 0 !important;
                border: none !important;
            }
            
            /* ৪. কন্টেইনারকে ফুল উইডথ দেওয়া */
            #app-container, #mainContent, .table-container { 
                border: none !important; 
                box-shadow: none !important; 
                outline: none !important;
                width: 100% !important; 
                max-width: 100% !important; 
                margin: 0 !important; 
                padding: 0 !important;
                overflow: visible !important;
            }
            
            .print-only { 
                display: block !important; 
            }

            /* ৫. ১-৩১ তারিখ এক পেজে ফিট করার জন্য ফিক্সড টেবিল লেআউট */
            table { 
                border: 1px solid #000000 !important; 
                width: 100% !important; 
                table-layout: fixed !important; /* স্ক্রিনের বাইরে টেবিল যেতে দেবে না */
                border-collapse: collapse !important;
                page-break-inside: avoid;
            }
            
            /* ৬. হেডারের ফন্ট ও হালকা গ্রে ব্যাকগ্রাউন্ড (সাদাকালোতে স্পষ্ট রিডিবিলিটি) */
            thead th { 
                background: #f0f0f0 !important; 
                color: black !important; 
                font-weight: bold !important;
                font-size: 8px !important; 
                padding: 5px 1px !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            
            /* ৭. ডাটা রো এবং টেক্সট সাইজ ৮ পিক্সেল করা যেন ১-৩১ তারিখ ধরে */
            th, td { 
                border: 1px solid #000000 !important; 
                color: black !important; 
                background: white !important; 
                padding: 4px 1px !important; 
                font-size: 8px !important; 
                text-align: center !important;
                word-wrap: break-word !important;
                white-space: normal !important;
            }

            /* ৮. প্রথম কলামগুলোর পার্সেন্টেজ নির্দিষ্ট করা (বাকিটা ১-৩১ তারিখ ভাগ করে নেবে) */
            th.sticky-sl, td.sticky-sl { width: 3% !important; }
            th.sticky-id, td.sticky-id { width: 6% !important; }
            th.sticky-name, td.sticky-name { 
                width: 14% !important; 
                text-align: left !important; 
                padding-left: 3px !important;
                font-weight: bold !important;
            }
            th.total-col, td.total-col { 
                width: 5% !important; 
                font-weight: bold !important;
                background: #e6e6e6 !important; 
            }

            /* ৯. সাদাকালো প্রিন্টারে রবিবার কলাম চেনার জন্য দুই পাশে ড্যাশড (---) বর্ডার */
            .sun-col {
                background: #fafafa !important; 
                border-left: 1.5px dashed black !important; 
                border-right: 1.5px dashed black !important; 
            }
            
            /* টোটাল বা ফুটার রো */
            #attendanceFoot td {
                font-weight: bold !important;
                background: #e6e6e6 !important;
            }
        }
    </style>
</head>
<body class="p-3 md:p-5">

    <!-- Loading -->
    <div id="initial-overlay">
        <img src="https://lh3.googleusercontent.com/d/11bxOPboUUmQxIkT6gMYWYqxfh9jZSiLo" alt="Logo"
             style="height:80px; width:auto; object-fit:contain; margin-bottom:8px; filter:brightness(1.2);">
        <div style="font-size:11px; font-weight:900; color:#f5b700; letter-spacing:3px; text-transform:uppercase; margin-bottom:20px;">
            ALAMHOW CO LTD.
        </div>
        <div class="loader-spinner"></div>
        <p>Loading Data...</p>
    </div>

    <div id="app-container" style="max-width:99%; margin:0 auto; background:white; border-radius:16px; overflow:hidden; box-shadow:0 25px 60px rgba(0,0,0,0.4); border:2px solid rgba(212,160,23,0.4);">

        <!-- Header -->
        <div class="app-header no-print">
            <div style="display:flex; align-items:center; gap:16px;">
                <img src="https://lh3.googleusercontent.com/d/11bxOPboUUmQxIkT6gMYWYqxfh9jZSiLo" alt="Logo" class="brand-logo">

<script>
    const FIREBASE_URL = "https://munna-acl-fda7c-default-rtdb.asia-southeast1.firebasedatabase.app";
    const OT_NODE = "OVER_TIME";
    let rawData = [];
    let uniqueEmployeeMap = [];
    const daysEn   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    const monthsEn = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

    async function initSystem() {
        try {
            const res  = await fetch(`${FIREBASE_URL}/${OT_NODE}.json`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const json = await res.json();
            if (!json) throw new Error("No data found");
            rawData = flattenFirebaseData(json);
            initFilters();
            document.getElementById('initial-overlay').style.display = 'none';
            document.getElementById('app-container').style.display   = 'block';
        } catch (err) {
            document.getElementById('initial-overlay').innerHTML =
                `<div style="text-align:center;color:#fcd34d;padding:20px;">
                    <div style="font-size:32px;margin-bottom:12px;">⚠️</div>
                    <p style="font-weight:700;margin-bottom:8px;">Data load failed</p>
                    <small style="color:#93c5fd;">${err.message}</small><br>
                    <button onclick="location.reload()" style="margin-top:16px;padding:8px 20px;background:#d4a017;color:#0f2460;border:none;border-radius:8px;font-weight:800;cursor:pointer;">Retry</button>
                </div>`;
        }
    }

    function flattenFirebaseData(otRoot) {
        const records = [];
        Object.values(otRoot).forEach(monthObj => {
            if (typeof monthObj !== 'object' || !monthObj) return;
            Object.values(monthObj).forEach(dateObj => {
                if (typeof dateObj !== 'object' || !dateObj) return;
                Object.values(dateObj).forEach(record => {
                    if (typeof record !== 'object' || !record) return;
                    records.push({
                        id:          String(record.ID          || "").trim(),
                        name:        String(record.Name        || "N/A").trim(),
                        otDate:      String(record.OT_Date     || "").trim(),
                        otHours:     parseFloat(record.TOTAL_OT_HOURS || 0) || 0,
                        otRate:      record.OT_Rate   || 0,
                        totalTaka:   parseFloat(record.Total_Taka || 0) || 0,
                        site:        String(record.Site        || "").trim().replace(/\s+/g,' '),
                        designation: String(record.Designation || "").trim(),
                        passport:    String(record.Passport    || "").trim(),
                    });
                });
            });
        });
        return records;
    }

    function initFilters() {
        const seenIds = new Set();
        rawData.forEach(item => {
            if (item.id && !seenIds.has(item.id)) {
                seenIds.add(item.id);
                uniqueEmployeeMap.push({ id: item.id, name: item.name });
            }
        });
        uniqueEmployeeMap.sort((a,b) => a.id.localeCompare(b.id, undefined, {numeric:true}));
        setupCustomDatePicker('fromDate','fromCalendar');
        setupCustomDatePicker('toDate','toCalendar');
        setupIdSuggestions();
        updateSiteDropdown();
    }

   function updateSiteDropdown() {
    const from = document.getElementById('fromDate').value;
    const to   = document.getElementById('toDate').value;
    const sel  = document.getElementById('filterSite');
    const prev = sel.value;
    
    while (sel.options.length > 1) sel.remove(1);

    // ← দুটো date না থাকলে dropdown খালি রাখো
    if (!from || !to) {
        sel.value = '';
        return;
    }

    const startD = new Date(from);
    const endD   = new Date(to);
    // ← শুধু selected range এর data filter করো
    const filtered = rawData.filter(i => {
        const d = new Date(i.otDate);
        return d >= startD && d <= endD;
    });

    const siteMap = new Map();
    filtered.forEach(i => {
        const s = (i.site || "").trim();
        if (s) siteMap.set(s.toLowerCase(), s);
    });

    [...siteMap.values()].sort((a, b) => a.localeCompare(b)).forEach(site => {
        const opt = document.createElement('option');
        opt.value = site;
        opt.textContent = site;
        sel.appendChild(opt);
    });

    // ← আগের selection যদি নতুন range এ থাকে তাহলে রাখো
    if (prev && [...siteMap.values()].some(s => s === prev)) {
        sel.value = prev;
    } else {
        sel.value = '';
    }
}

   function setupCustomDatePicker(inputId, calendarId) {
    const input    = document.getElementById(inputId);
    const calendar = document.getElementById(calendarId);
    
    input.addEventListener('click', e => {
        e.stopPropagation();
        document.querySelectorAll('.custom-calendar,.suggestion-box')
                .forEach(el => el.style.display='none');
        
        // ← input এর position অনুযায়ী calendar বসান
        const rect = input.getBoundingClientRect();
        calendar.style.top  = (rect.bottom + window.scrollY + 4) + 'px';
        calendar.style.left = rect.left + 'px';
        
        calendar.style.display = 'block';
        renderCalendar(calendar, input);
    });
    
    document.addEventListener('click', e => {
        if (!calendar.contains(e.target)) calendar.style.display = 'none';
    });
}

    function renderCalendar(calendarEl, inputEl) {
        let d0 = new Date();
        if (inputEl.value) { const p=new Date(inputEl.value); if(!isNaN(p)) d0=p; }
        let cM=d0.getMonth(), cY=d0.getFullYear();

        const build = () => {
            const firstDay    = new Date(cY,cM,1).getDay();
            const daysInMonth = new Date(cY,cM+1,0).getDate();
            const sel         = inputEl.value;

            calendarEl.innerHTML = `
            <div class="cal-header">
                <button class="cal-nav prev">❮</button>
                <span class="cal-month">${monthsEn[cM]} ${cY}</span>
                <button class="cal-nav next">❯</button>
            </div>
            <div class="cal-days-header">
                <div>Su</div><div>Mo</div><div>Tu</div><div>We</div><div>Th</div><div>Fr</div><div>Sa</div>
            </div>
            <div class="cal-grid">
                ${'<div></div>'.repeat(firstDay)}
                ${Array.from({length:daysInMonth},(_,i)=>{
                    const day=i+1;
                    const ds=`${cY}-${String(cM+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                    const active = ds===sel ? 'cal-selected' : '';
                    return `<div class="calendar-day-cell ${active}" data-date="${ds}">${day}</div>`;
                }).join('')}
            </div>`;

            calendarEl.querySelector('.prev').onclick = e => { e.stopPropagation(); cM--; if(cM<0){cM=11;cY--;} build(); };
            calendarEl.querySelector('.next').onclick = e => { e.stopPropagation(); cM++; if(cM>11){cM=0;cY++;} build(); };
            calendarEl.querySelectorAll('.calendar-day-cell').forEach(c => {
                c.onclick = e => { e.stopPropagation(); inputEl.value=c.dataset.date; calendarEl.style.display='none'; updateSiteDropdown(); };
            });
        };
        build();
    }

    function setupIdSuggestions() {
        const input = document.getElementById('filterId');
        const box   = document.getElementById('idSuggestions');
        input.oninput = e => {
            const term = e.target.value.toLowerCase();
            const filtered = uniqueEmployeeMap.filter(emp =>
                emp.id.toLowerCase().includes(term) || emp.name.toLowerCase().includes(term)
            ).slice(0,10);
            if (filtered.length && term) {
                box.innerHTML = filtered.map(emp =>
                    `<div class="suggestion-item" data-id="${emp.id}">
                        <b>${emp.id}</b><span style="color:#64748b;">${emp.name}</span>
                    </div>`
                ).join('');
                box.style.display = 'block';
                box.querySelectorAll('.suggestion-item').forEach(d =>
                    d.onclick = () => { input.value=d.dataset.id; box.style.display='none'; }
                );
            } else box.style.display = 'none';
        };
    }

    function applyFilters() {
        const from = document.getElementById('fromDate').value;
        const to   = document.getElementById('toDate').value;
        if (!from || !to) { alert("Please select Start and End dates."); return; }

        const id   = document.getElementById('filterId').value.trim().toLowerCase();
        const site = document.getElementById('filterSite').value;
        const startD = new Date(from), endD = new Date(to);

        const filtered = rawData.filter(item => {
            const d = new Date(item.otDate);
            const matchId   = id   ? (item.id.toLowerCase().includes(id) || item.name.toLowerCase().includes(id)) : true;
            const matchSite = site ? item.site === site : true;
            return matchId && matchSite && d>=startD && d<=endD;
        });

        document.getElementById('attendanceSection').style.display     = 'block';
        document.getElementById('detailedReportSection').style.display = 'none';
        document.getElementById('breakdownBtn').style.display          = 'inline-flex';
        document.getElementById('printBtn').style.display              = 'flex';
        document.getElementById('mainContent').style.display           = 'block';
        renderAll(filtered, startD, endD);
    }

    function renderAll(data, start, end) {
        const dateRangeStr = `${start.toLocaleDateString('en-GB')} → ${end.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}`;
        document.getElementById('monthYearDisplay').innerText   = dateRangeStr;
        document.getElementById('printPeriodDisplay').innerText = dateRangeStr;

        const dateList = [];
        let curr = new Date(start);
        while (curr<=end) { dateList.push(new Date(curr)); curr.setDate(curr.getDate()+1); }

        const head = document.getElementById('attendanceHead');
        const body = document.getElementById('attendanceBody');
        const foot = document.getElementById('attendanceFoot');

        // Header
        let hHtml = `<tr>
            <th class="sticky-sl">SL</th>
            <th class="sticky-id">ID</th>
            <th class="sticky-name">EMPLOYEE NAME</th>`;
        dateList.forEach(d => {
            const isSun = d.getDay()===0;
            hHtml += `<th style="${isSun?'background:#dc2626;':'background:var(--navy-dark);'} min-width:34px; font-size:9px; color:white; padding:7px 2px;">
                ${daysEn[d.getDay()]}<br>${d.getDate()}
            </th>`;
        });
        head.innerHTML = hHtml + `<th class="total-col">TOTAL</th></tr>`;

        // Employees
        const employees = {};
        data.forEach(item => { if(!employees[item.id]) employees[item.id]={name:item.name}; });
        const empIds = Object.keys(employees).sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}));

        let gt=0;
        const colTot={};

        body.innerHTML = empIds.map((uid,idx) => {
            let rowTot=0;
            let row=`<tr>
                <td class="sticky-sl" style="color:#64748b; font-size:11px;">${idx+1}</td>
                <td class="sticky-id id-cell">${uid}</td>
                <td class="sticky-name" style="font-weight:600;">${employees[uid].name}</td>`;

            dateList.forEach(d => {
                const ds    = d.toLocaleDateString('en-CA');
                const entry = data.find(e => e.id===uid && new Date(e.otDate).toLocaleDateString('en-CA')===ds);
                const hours = entry ? entry.otHours : 0;
                rowTot         += hours;
                colTot[ds]      = (colTot[ds]||0) + hours;
                const sunStyle  = d.getDay()===0 ? 'class="sun-col"' : '';
                row += `<td ${sunStyle}>${hours>0 ? `<span style="font-weight:700;color:var(--navy-dark);">${Number(hours.toFixed(2))}</span>` : '<span style="color:#cbd5e1;">—</span>'}</td>`;
            });

            gt += rowTot;
            return row + `<td class="total-col">${Number(rowTot.toFixed(2))}</td></tr>`;
        }).join('');

        // Footer
        let fHtml = `<tr><td colspan="3" style="text-align:right; padding-right:10px;">GRAND TOTAL</td>`;
        dateList.forEach(d => {
            const cVal = colTot[d.toLocaleDateString('en-CA')]||0;
            fHtml += `<td style="color:var(--navy-dark);">${cVal>0?Number(cVal.toFixed(2)):'—'}</td>`;
        });
        foot.innerHTML = fHtml + `<td class="total-col" style="background:var(--navy-dark);color:white;">${Number(gt.toFixed(2))}</td></tr>`;

        // Breakdown
        const dBody      = document.getElementById('detailsBody');
        const sortedData = [...data].sort((a,b)=>new Date(a.otDate)-new Date(b.otDate));
        let tAmt=0;
        dBody.innerHTML = sortedData.map((item,i) => {
            tAmt += item.totalTaka;
            const bg = i%2===0 ? '' : 'background:#f5f7ff;';
            return `<tr style="${bg}">
                <td style="text-align:left; padding-left:14px; color:#64748b;">${item.otDate}</td>
                <td style="font-weight:800; color:var(--navy-dark);">${item.id}</td>
                <td style="text-align:left; font-weight:600;">${item.name}</td>
                <td style="text-align:left; color:#64748b;">${item.designation||'-'}</td>
                <td style="text-align:left;">${item.site}</td>
                <td style="color:var(--navy-dark); font-weight:700;">${item.otRate}</td>
                <td style="font-weight:700;">${Number(item.otHours.toFixed(2))}</td>
                <td style="font-weight:800; color:var(--navy-dark);">${item.totalTaka.toLocaleString()}</td>
            </tr>`;
        }).join('');

        document.getElementById('detailsFoot').innerHTML =
            `<tr>
                <td colspan="6" style="text-align:right; padding-right:14px;">TOTAL</td>
                <td>${Number(gt.toFixed(2))} hrs</td>
                <td>${tAmt.toLocaleString()} /-</td>
            </tr>`;
    }

    function showBreakdownOnly() {
        document.getElementById('attendanceSection').style.display     = 'none';
        document.getElementById('detailedReportSection').style.display = 'block';
    }

    function handlePrint() {
        const now = new Date();
        document.getElementById('pd').innerText = now.toLocaleDateString('en-GB');
        document.getElementById('pt').innerText = now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
        window.print();
    }

    window.onload = initSystem;
</script>
</body>
</html>
